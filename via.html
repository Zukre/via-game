<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIA GAME</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root{ --lx-gold:#d9b877; --lx-gold-br:#efd8a3; --lx-gold-ln:rgba(217,184,119,.20);
               --lx-panel:#14171e; --lx-panel2:#171b23; --lx-ink:#0d1016; --lx-line:#242833;
               --lx-text:#f3efe6; --lx-muted:#9c988e; --lx-em:#5cb08b; --lx-rose:#cf9a9a; }
        body {
            background:
              radial-gradient(1100px 560px at 50% -12%, rgba(217,184,119,.06), transparent 62%),
              #0a0c10;
            color: var(--lx-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 18px;
        }
        .container { max-width: 1080px; margin: 0 auto; }

        .card {
            background: linear-gradient(180deg,var(--lx-panel2),var(--lx-panel));
            border: 1px solid var(--lx-line);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 34px rgba(0,0,0,0.35);
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 16px; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 16px; margin-bottom: 16px; }

        .stat-box { border-radius: 10px; padding: 18px; border: 1px solid #1f2937; }
        .stat-blue { background: rgba(30, 58, 138, 0.2); border-color: #2563eb; }
        .stat-rose { background: rgba(153, 27, 27, 0.2); border-color: #dc2626; }
        .stat-emerald { background: rgba(6, 78, 59, 0.2); border-color: #059669; }
        .stat-amber { background: rgba(120, 53, 15, 0.25); border-color: #d97706; }
        .val-blue { color: #3b82f6; font-size: 24px; font-weight: 800; }
        .val-rose { color: #ef4444; font-size: 24px; font-weight: 800; }
        .val-emerald { color: #10b981; font-size: 24px; font-weight: 800; }
        .val-amber { color: #fbbf24; font-size: 24px; font-weight: 800; }

        .block-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--lx-muted);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            border-bottom: 1px solid var(--lx-gold-ln);
            padding-bottom: 10px;
            margin-bottom: 14px;
        }

        .inp {
            background: var(--lx-ink);
            border: 1px solid var(--lx-line);
            border-radius: 10px;
            padding: 11px 13px;
            color: var(--lx-text);
            width: 100%;
            font-size: 14px;
        }
        .inp:focus { border-color: var(--lx-gold-ln); outline: none; box-shadow:0 0 0 3px rgba(217,184,119,.08); }
        select.inp { cursor: pointer; }

        .btn {
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.18s;
        }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: linear-gradient(180deg,var(--lx-gold-br),var(--lx-gold)); color:#20180a; width: 100%; padding: 13px; font-size: 14px; box-shadow:0 8px 22px rgba(217,184,119,.20); }
        .btn-amber { background: #d97706; color: white; }
        .btn-orange { background: #ea580c; color: white; font-size: 11px; text-transform: uppercase; padding: 6px 12px; }
        .btn-gray { background: var(--lx-panel); color: var(--lx-text); border:1px solid var(--lx-line); }
        .btn-gray:hover { border-color: var(--lx-gold-ln); color: var(--lx-gold-br); filter:none; }
        .btn:hover { filter: brightness(1.08); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 13px;
            background: var(--lx-ink);
            border-radius: 10px;
            margin-bottom: 7px;
            font-size: 13.5px;
            border: 1px solid var(--lx-line);
        }
        .strike { text-decoration: line-through; opacity: 0.35; }

        .player-card {
            background: #111827; border: 1px solid #1f2937; padding: 14px; border-radius: 10px; margin-bottom: 8px; cursor: pointer;
        }
        .player-card:hover { border-color: #3b82f6; background: #1f2937; }

        .win-box { background: rgba(17, 24, 39, 0.6); border: 2px solid #1f2937; text-align: center; }
        .win-active { border-color: #10b981; background: rgba(6, 78, 59, 0.1); }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 6px;
        }
        .b-blue { background: #1e3a8a; color: #93c5fd; }
        .b-green { background: #064e3b; color: #6ee7b7; }
        .b-amber { background: #78350f; color: #fcd34d; }
        .b-rose { background: #7f1d1d; color: #fca5a5; }

        .sub-section {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #1f2937;
        }
        .sub-label {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.4px;
        }
        .pending-alert {
            background: #78350f;
            border: 1px solid #d97706;
            color: #fcd34d;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            font-size: 13px;
        }
        /* ─── ПОЛЕ (движок хода) ─── */
        .board-wrap{position:relative; width:100%; max-width:560px; margin:0 auto; aspect-ratio:1536/1024;
            border-radius:14px; overflow:hidden; border:1px solid rgba(217,184,119,.28);
            box-shadow:0 16px 46px rgba(0,0,0,.6), 0 0 0 1px rgba(0,0,0,.4);}
        .board-field{position:absolute; inset:0; background:url('via_field.png') center/100% 100% no-repeat; background-color:#0a0f1e;}
        .board-field::after{content:""; position:absolute; inset:0; box-shadow:inset 0 0 70px rgba(0,0,0,.45); pointer-events:none;}
        .tok{position:absolute; width:3.4%; aspect-ratio:1; border-radius:50%; transform:translate(-50%,-50%);
            border:2px solid rgba(255,255,255,.85); box-shadow:0 2px 8px rgba(0,0,0,.55),0 0 12px currentColor; z-index:5;
            transition:left .55s cubic-bezier(.34,1.1,.64,1), top .55s cubic-bezier(.34,1.1,.64,1);}
        .tok.turn{z-index:6; box-shadow:0 2px 8px rgba(0,0,0,.55),0 0 18px 3px currentColor, 0 0 0 2px rgba(239,216,163,.9);}
        .tok.turn::after{content:""; position:absolute; inset:-40%; border-radius:50%; border:2px solid currentColor; opacity:.5; animation:tokping 1.5s ease-out infinite;}
        @keyframes tokping{0%{transform:scale(.6);opacity:.6}100%{transform:scale(1.5);opacity:0}}
        @keyframes tokbob{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-72%)}}
        .glow{position:absolute; width:8.5%; aspect-ratio:1; transform:translate(-50%,-50%); border-radius:16px;
            pointer-events:none; z-index:4; box-shadow:0 0 0 3px currentColor,0 0 28px 6px currentColor; animation:glowlp 1.1s ease-in-out infinite;}
        @keyframes glowlp{0%,100%{opacity:.55}50%{opacity:1}}
        .pchip{display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:20px;
            background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); font-size:12px; margin:3px;}
        .pchip.turn{border-color:#fff; box-shadow:0 0 14px rgba(255,255,255,.3); transform:scale(1.06);}
        .pchip .dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 8px currentColor;}
    </style>
</head>
<body>

    <!-- Плавающий индикатор данных (правый верх) — всегда видно содержимое localStorage -->
    <div id="debugBar" style="position:fixed; top:8px; right:8px; background:#0b0f19; border:1px solid #1f2937; padding:6px 12px; border-radius:8px; font-size:11px; color:#9ca3af; z-index:1000; font-family:monospace;">
        💾 LS: загрузка...
    </div>

    <div id="app" class="container"></div>

    <script>
        // ─── ПРОФЕССИИ для VIA ───
        const professionsDB = [
            { id: 1, name: 'Дворник 🧹', salary: 1840, taxes: 280,
              mortgagePay: 200, eduPay: 0, autoPay: 190, ccPay: 50, retailPay: 30, otherExp: 300, childCost: 70, savings: 660,
              initMortgage: 20000, initEdu: 0, initAuto: 7000, initCC: 1000, initRetail: 800 },

            { id: 2, name: 'Охранник 🛡️', salary: 1380, taxes: 200,
              mortgagePay: 180, eduPay: 0, autoPay: 100, ccPay: 60, retailPay: 50, otherExp: 200, childCost: 60, savings: 400,
              initMortgage: 18000, initEdu: 0, initAuto: 4000, initCC: 1500, initRetail: 1200 },

            { id: 3, name: 'Полицейский 👮‍♂️', salary: 2070, taxes: 250,
              mortgagePay: 550, eduPay: 80, autoPay: 200, ccPay: 60, retailPay: 50, otherExp: 250, childCost: 120, savings: 750,
              initMortgage: 55000, initEdu: 6000, initAuto: 12000, initCC: 2000, initRetail: 1500 },

            { id: 4, name: 'Программист 💻', salary: 5175, taxes: 700,
              mortgagePay: 1200, eduPay: 100, autoPay: 220, ccPay: 90, retailPay: 80, otherExp: 1000, childCost: 160, savings: 1200,
              initMortgage: 120000, initEdu: 12000, initAuto: 11000, initCC: 3000, initRetail: 2000 },

            { id: 5, name: 'Юрист ⚖️', salary: 4830, taxes: 600,
              mortgagePay: 1100, eduPay: 120, autoPay: 300, ccPay: 100, retailPay: 80, otherExp: 750, childCost: 160, savings: 1500,
              initMortgage: 110000, initEdu: 13000, initAuto: 14000, initCC: 4000, initRetail: 2200 },

            { id: 6, name: 'Врач 🩺', salary: 3680, taxes: 600,
              mortgagePay: 900, eduPay: 300, autoPay: 350, ccPay: 70, retailPay: 100, otherExp: 350, childCost: 170, savings: 800,
              initMortgage: 90000, initEdu: 30000, initAuto: 15000, initCC: 3500, initRetail: 2500 },

            { id: 7, name: 'Инфобизнесмен 🚀', salary: 7475, taxes: 1000,
              mortgagePay: 1300, eduPay: 80, autoPay: 300, ccPay: 120, retailPay: 100, otherExp: 2500, childCost: 160, savings: 2500,
              initMortgage: 130000, initEdu: 8000, initAuto: 18000, initCC: 5000, initRetail: 3000 },

            { id: 8, name: 'Кинопродюсер 🎬', salary: 10925, taxes: 1900,
              mortgagePay: 1800, eduPay: 120, autoPay: 400, ccPay: 200, retailPay: 200, otherExp: 3300, childCost: 170, savings: 5000,
              initMortgage: 180000, initEdu: 12000, initAuto: 22000, initCC: 8000, initRetail: 5000 }
        ];

        // ─── КАРЬЕРА: 10 навыков (d10). pct = прибавка к зарплате; кап суммарно +20%. ───
        const CAREER_SKILLS = [
            { key:'kurs',   name:'Курсы квалификации 🎓', pct:0.02, note:'+2% к зарплате' },
            { key:'eng',    name:'Английский язык 🗣️',    pct:0.01, note:'+1%, межд. сделки' },
            { key:'time',   name:'Тайм-менеджмент ⏱️',    pct:0.01, note:'+1% к зарплате' },
            { key:'nego',   name:'Переговоры/продажи 🤝', pct:0.02, note:'+2% к зарплате' },
            { key:'comp',   name:'Компьютер/AI 💻',        pct:0.02, note:'+2% к зарплате' },
            { key:'lead',   name:'Лидерство 👑',           pct:0.02, note:'+2%, шанс смены ×2 (6%)' },
            { key:'fin',    name:'Фин. грамотность 📊',    pct:0.01, note:'+1%, дешевле кредиты' },
            { key:'net',    name:'Нетворкинг 🌐',          pct:0.01, note:'+1%, бонус на «Связи»' },
            { key:'health', name:'Здоровье/спорт 💪',      pct:0.01, note:'+1%, защита на «Медицине»' },
            { key:'second', name:'Вторая специальность 🧩',pct:0.02, note:'+2%, шанс смены сразу' }
        ];

        // ─── НАВЫК (отдельная клетка): «вкладываешь в себя», НЕ всегда про работу.
        // Эффекты — ЧЕРНОВИК (Rinat дорабатывает), движком ещё не применяются. ───
        const LIFE_SKILLS = [
            { key:'nego',   name:'Переговоры 🤝',             draft:'скидка на первый взнос в крупных сделках' },
            { key:'sales',  name:'Продажи 💼',                draft:'продаёшь активы/акции дороже' },
            { key:'know',   name:'Знакомства 🌐',             draft:'бонус на клетке «Связи», доступ к партнёрам' },
            { key:'rel',    name:'Отношения ❤️',              draft:'крепче семья: меньше расходов на детей / защита от события' },
            { key:'finlit', name:'Финансовая грамотность 📊', draft:'дешевле кредиты, видишь подсказки рынка' }
        ];

        // SERVER_MODE: если открыто через http://localhost — используем общий Python-сервер
        // (sync между ВСЕМИ браузерами). file:// → fallback на localStorage (только Chrome).
        const SERVER_MODE = location.protocol === 'http:' || location.protocol === 'https:';

        let state = {
            view: 'lobby',
            board: null,   // состояние поля (движок хода) — всегда свежее с сервера
            players: SERVER_MODE ? [] : (JSON.parse(localStorage.getItem('v0_players')) || []),
            deals: SERVER_MODE ? [] : (JSON.parse(localStorage.getItem('v0_deals')) || []),
            currentPlayerId: null,
            chosenProf: null,
            nameDraft: '',
            err: '',
            skillModal: null,
            govModal: null,
            world: SERVER_MODE ? null : (JSON.parse(localStorage.getItem('v0_world') || 'null')),
            worldDraw: null,
            worldShow: null,
            workModal: null,
            expenseModal: null,
            taxModal: null,
            svyazModal: null,
            sdelkaModal: null,
            medModal: null
        };

        // Глобально уникальный id заявки: время + счётчик + случайное.
        // Раньше был bare Date.now() → у двух игроков в одну миллисекунду совпадали id,
        // и одобрение/слияние заявок уходило не тому игроку (напр. закрытие кредита чужому).
        let _uidSeq = 0;
        function uid() {
            return 'd' + Date.now().toString(36) + (_uidSeq++).toString(36) + Math.floor(Math.random()*1e9).toString(36);
        }

        function reloadFromStorage() {
            if (SERVER_MODE) return;  // в server-mode polling обновляет state в фоне
            state.players = JSON.parse(localStorage.getItem('v0_players')) || [];
            state.deals = JSON.parse(localStorage.getItem('v0_deals')) || [];
            state.world = JSON.parse(localStorage.getItem('v0_world') || 'null');
            maybeShowWorld();
        }

        // BroadcastChannel — самый надёжный канал между вкладками (работает в file://).
        let bc = null;
        try { bc = new BroadcastChannel('via_sync'); } catch(e) { console.warn('BroadcastChannel недоступен'); }
        let lastDataHash = '';
        function dataHash() {
            return (localStorage.getItem('v0_players')||'') + '|' + (localStorage.getItem('v0_deals')||'');
        }
        function safeRerender() {
            const a = document.activeElement;
            if (!a || (a.tagName !== 'INPUT' && a.tagName !== 'TEXTAREA' && a.tagName !== 'SELECT')) {
                render();
            }
        }

        function save(meId) {
            lastSaveT = Date.now();   // отметка: только что записали локально — опрос не затирает 2.2с
            if (SERVER_MODE) {
                // meId != null → сервер сольёт ТОЛЬКО этого игрока (без затирания остальных).
                // Игрок пишет только свой бланк; ведущий (admin) шлёт всё целиком (авторитет).
                const me = (meId != null) ? meId
                          : (state.view === 'player' ? state.currentPlayerId : null);
                // fire-and-forget POST — UI обновится мгновенно, остальные браузеры подтянут polling'ом
                fetch('/data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({players: state.players, deals: state.deals, world: state.world, me: me})
                }).catch(e => console.warn('save error:', e));
                return;
            }
            localStorage.setItem('v0_players', JSON.stringify(state.players));
            localStorage.setItem('v0_deals', JSON.stringify(state.deals));
            localStorage.setItem('v0_world', JSON.stringify(state.world || null));
            lastDataHash = dataHash();
            if (bc) { try { bc.postMessage('updated'); } catch(e) {} }
        }

        // Сервер-mode: применяем стейт с сервера (общий код для push и опроса)
        let lastServerData = '';
        let lastSaveT = 0;   // время последней локальной записи (антизатирание своих же ходов)
        function applyServerData(txt) {
            if (!txt || txt === lastServerData) return;
            let j; try { j = JSON.parse(txt); } catch(e) { return; }
            // рынок и мировые события — всегда актуальные
            if (j.market) state.market = j.market;   // живые цены рынка
            state.world = j.world || null;           // мировое событие (broadcast)
            state.board = j.board || null;           // поле (движок хода) — всегда свежее
            // players/deals НЕ затираем, пока наш свежий POST (покупка/заявка) не долетел —
            // иначе обновление стирает только что созданную заявку/покупку игрока.
            if (Date.now() - lastSaveT > 2200) {
                lastServerData = txt;
                state.players = j.players || [];
                state.deals = j.deals || [];
            }
            maybeShowWorld();
            safeRerender();
        }
        // ГЛАВНЫЙ канал: SSE — сервер сам мгновенно толкает изменения (реальное время).
        let _es = null;
        function startSSE() {
            try {
                _es = new EventSource('/events');
                _es.onmessage = (e) => applyServerData(e.data);
                // onerror: EventSource сам переподключается; опрос ниже подстрахует
                _es.onerror = () => {};
            } catch(e) {}
        }
        // Страховка: опрос /data (реже, чем раньше — основную работу делает push)
        async function pollServer() {
            try {
                const r = await fetch('/data', {cache: 'no-store'});
                if (!r.ok) return;
                applyServerData(await r.text());
            } catch(e) {}
        }

        function calc(p) {
            if (!p) return {};
            const skillBonus = Math.min(0.20, (p.skills || []).reduce((s, sk) => s + (Number(sk.pct) || 0), 0));
            const baseSalary = p.prof.salary;
            const salary = Math.round(baseSalary * (1 + skillBonus));
            const passive = p.assets.reduce((s, a) => s + Number(a.cf || 0), 0);
            const income = salary + passive;

            const taxes = Math.max(0, p.prof.taxes + (Number(p.taxMod) || 0)) + Math.round(income * (Number(p.taxPct) || 0) / 100);
            const mortgagePay = p.isM ? 0 : p.prof.mortgagePay;
            const eduPay = p.isE ? 0 : p.prof.eduPay;
            const autoPay = p.isA ? 0 : p.prof.autoPay;
            const ccPay = p.isCC ? 0 : p.prof.ccPay;
            const retailPay = p.isR ? 0 : p.prof.retailPay;
            const otherExp = p.prof.otherExp + (Number(p.expMod) || 0);
            const childExp = p.children * p.prof.childCost;
            const bankPay = Math.round(p.bankLoan * 0.10);

            const totalExp = taxes + mortgagePay + eduPay + autoPay + ccPay + retailPay + otherExp + childExp + bankPay;
            const flow = income - totalExp;
            const target = totalExp * 7;

            return { salary, baseSalary, skillBonus, passive, income, taxes, mortgagePay, eduPay, autoPay, ccPay, retailPay,
                     otherExp, childExp, bankPay, totalExp, flow, target,
                     win: passive >= target };
        }
        // 5 УРОВНЕЙ «Путь свободы» (центр поля): по доле пассив/расходы. L5 = свобода (пассив ≥ расходов).
        function playerLevel(f){
            const r = f.totalExp>0 ? f.passive/f.totalExp : (f.passive>0?1:0);
            if(r>=1)    return {n:5, name:'Наследие',        d:'Абсолютная свобода'};
            if(r>=0.75) return {n:4, name:'Инвестор',        d:'Капитал работает на тебя'};
            if(r>=0.50) return {n:3, name:'Предприниматель', d:'Создаёшь систему'};
            if(r>=0.25) return {n:2, name:'Растёшь',         d:'Развиваешь навыки и активы'};
            return                 {n:1, name:'Работник',    d:'Стабильность и опыт'};
        }

        function hasPendingFor(pId) {
            return state.deals.some(d => d.pId == pId && d.status === 'PENDING');
        }

        function updateDebugBar() {
            const bar = document.getElementById('debugBar');
            if (!bar) return;
            const pCount = state.players.length;
            const dCount = state.deals.length;
            const mode = SERVER_MODE
                ? '<span style="color:#10b981;">🌐 SERVER</span>'
                : '<span style="color:#fbbf24;">💾 LS-only</span>';
            bar.innerHTML = `${mode}: <b style="color:#3b82f6;">${pCount}</b> игроков · <b style="color:#ef4444;">${dCount}</b> заявок`;
        }

        function render() {
            // ВСЕГДА перечитываем перед рендером — гарантирует свежесть данных
            reloadFromStorage();
            // Лечим активы из старых данных: карты-сделки раньше клали название в name, а бланк ждёт title
            (state.players || []).forEach(p => (p.assets || []).forEach(a => {
                if (a && a.title == null && a.name != null) a.title = a.name;
            }));

        // ─── БИРЖА (торговля по живой цене сервера) ───
        function assetById(id){ const m=state.market; return (m&&m.assets)?m.assets.find(x=>String(x.id)===String(id)):null; }
        function curPrice(id){ const a=assetById(id); return a?a.price:null; }
        function portfolioValue(p){ let v=0; if(p&&p.holdings){for(const id in p.holdings){const pr=curPrice(id); if(pr) v+=pr*p.holdings[id].qty;}} return v; }
        // Окно покупки: открывается на 1 мин, когда кто-то встаёт на клетку «Акции/Крипта» (для ВСЕХ).
        function buyWindowOpen(){ const b=state.board; return !!(b && b.buyWindowEndsAt && b.buyWindowEndsAt*1000 > Date.now()); }
        async function buyAsset(id){
            const p=state.players.find(x=>x.id==state.currentPlayerId); const a=assetById(id);
            if(!p||!a) return;
            if((Number(p.jail)||0)>0){ alert('🔒 Ты в тюрьме — покупка недоступна. Только лудка (казино).'); return; }
            if(SERVER_MODE && !buyWindowOpen()){
                alert('🔒 Покупка сейчас закрыта.\nОна открывается на 1 минуту для всех, когда кто-то встаёт на клетку «Акции / Крипта».');
                return;
            }
            const q=parseInt((prompt('Сколько штук «'+a.name+'» купить? Цена сейчас '+a.price+'$')||'0'),10);
            if(!q||q<1) return;
            const p0=a.price;                       // витрина ДО сделки
            let fill=p0;                            // цена исполнения (со стаканом)
            if(SERVER_MODE){
                try{
                    const r=await fetch('/market/impact',{method:'POST',headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({assetId:id,side:'buy',qty:q})});
                    const j=await r.json(); if(j&&j.avgFill) fill=j.avgFill;   // сервер двинул цену для всех
                }catch(e){ console.warn('impact:',e); }
            }
            const cost=Math.round(q*fill*100)/100;
            if(p.savings<cost){ alert('Не хватает кассы.\nПри таком объёме стакан поднял цену до ~'+fill+'$/шт — нужно '+Math.round(cost)+'$, есть '+Math.round(p.savings)+'$.'); return; }
            p.savings=Math.round((p.savings-cost)*100)/100;
            const bst=pstat(p); bst.buys++; bst.buyAmt=Math.round((bst.buyAmt+cost)*100)/100;
            p.holdings=p.holdings||{};
            const h=p.holdings[id]||{qty:0,avg:0,name:a.name};
            h.avg=(h.avg*h.qty + fill*q)/(h.qty+q); h.qty+=q; h.name=a.name;
            p.holdings[id]=h; save(); render();
            const moved = Math.abs(fill-p0)>0.0001 ? ('\n📈 Твой объём двинул рынок: витрина была '+p0+'$, ты взял по ~'+fill+'$/шт.') : '';
            alert('✅ Куплено '+q+' «'+a.name+'» по ~'+fill+'$  (−'+Math.round(cost)+'$)'+moved);
        }
        async function sellAsset(id){
            const p=state.players.find(x=>x.id==state.currentPlayerId); const a=assetById(id);
            if(!p||!a||!p.holdings||!p.holdings[id]) return;
            // в тюрьме продажа акций РАЗРЕШЕНА (Ринат): сидельцу доступны казино и продажа акций
            const have=p.holdings[id].qty;
            const q=parseInt((prompt('Сколько штук «'+a.name+'» продать? Есть '+have+', цена '+a.price+'$')||'0'),10);
            if(!q||q<1) return;
            if(q>have){ alert('У тебя только '+have+' шт.'); return; }
            const p0=a.price;                       // витрина ДО продажи
            let fill=p0;
            if(SERVER_MODE){
                try{
                    const r=await fetch('/market/impact',{method:'POST',headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({assetId:id,side:'sell',qty:q})});
                    const j=await r.json(); if(j&&j.avgFill) fill=j.avgFill;   // сервер просадил цену для всех
                }catch(e){ console.warn('impact:',e); }
            }
            const sst=pstat(p); sst.sells++; sst.sellAmt=Math.round((sst.sellAmt+q*fill)*100)/100;
            // ПРОДАЖА через одобрение ведущего. Цена исполнения (со стаканом) зафиксирована.
            state.deals.push({
                id: uid(), pId: p.id, pName: p.name, type: 'SELL_MARKET',
                details: { assetId: id, assetName: a.name, qty: q, price: fill, total: Math.round(q*fill) },
                status: 'PENDING'
            });
            save(); render();
            const moved = Math.abs(fill-p0)>0.0001 ? ('\n📉 Твой объём просадил рынок: витрина была '+p0+'$, выход по ~'+fill+'$/шт.') : '';
            alert('📨 Заявка на продажу ведущему.\n'+q+' «'+a.name+'» по ~'+fill+'$ (+'+Math.round(q*fill)+'$).'+moved+'\nПосле одобрения деньги придут в кассу.');
        }
        function renderMarketPanel(p){
            const m=state.market;
            if(!m||!m.assets) return '<div class="card"><div class="block-title">📈 Биржа</div><div style="color:#9ca3af;font-size:13px;">рынок загружается…</div></div>';
            p.holdings=p.holdings||{};
            const ownIds=Object.keys(p.holdings);
            let holdHtml = ownIds.length ? ownIds.map(id=>{
                const h=p.holdings[id], pr=curPrice(id)||0, val=pr*h.qty, pl=h.avg?((pr/h.avg-1)*100):0, c=pl>=0?'#10b981':'#f43f5e';
                return `<div class="row-item"><div style="flex:1;"><b>${h.name}</b> <span style="color:#9ca3af;font-size:12px;">${h.qty} шт · ср.${h.avg.toFixed(2)}$</span><div style="font-size:12px;color:${c};">сейчас ${pr.toFixed(pr<1?4:2)}$ · ${pl>=0?'+':''}${pl.toFixed(1)}%</div></div><div style="text-align:right;"><b>${Math.round(val)} $</b><br><button onclick="sellAsset('${id}')" class="btn btn-orange" style="margin-top:4px;">Продать</button></div></div>`;
            }).join('') : '<div style="color:#9ca3af;font-size:13px;">пока нет активов — открой биржу и купи</div>';
            const ev=(m.events_last||[]).filter(e=>ownIds.includes(String(e.id)));
            const alertHtml = ev.length ? ev.map(e=>`<div style="background:${e.kind==='КРАХ'?'#7f1d1d':'#064e3b'};color:#fff;padding:6px 10px;border-radius:8px;font-size:13px;margin-bottom:6px;">${e.kind==='КРАХ'?'💥':'🚀'} ТВОЙ актив «${e.name}»: ${e.kind} ${e.pct>0?'+':''}${e.pct}%!</div>`).join('') : '';
            let listHtml='';
            if(state.showMarket){
                listHtml=m.assets.map(a=>{
                    const base=a.price0||a.price, chg=base?((a.price/base-1)*100):0, c=chg>=0?'#10b981':'#f43f5e';
                    return `<div class="row-item"><div style="flex:1;"><b>${a.name}</b> <span style="font-size:10px;color:#9ca3af;">${a.type}</span><div style="font-size:12px;color:${c};">${a.price.toFixed(a.price<1?4:2)}$ · ${chg>=0?'+':''}${chg.toFixed(1)}%</div></div><button onclick="buyAsset('${a.id}')" class="btn" style="background:#10b981;color:#fff;">Купить</button></div>`;
                }).join('');
            }
            return `<div class="card">
                <div class="block-title">📈 Биржа · Год ${m.game_year||1}</div>
                <div id="buyTimer" style="display:none;text-align:center;background:#064e3b;color:#d1fae5;padding:6px 10px;border-radius:8px;font-weight:800;margin-bottom:8px;"></div>
                ${alertHtml}
                <div style="font-size:13px;color:#a7f3d0;margin-bottom:8px;">💼 Портфель: <b>${Math.round(portfolioValue(p))} $</b> &nbsp;·&nbsp; 💰 Касса: <b>${Math.round(p.savings)} $</b></div>
                <div style="font-size:12px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Мои активы</div>
                ${holdHtml}
                <button onclick="state.showMarket=!state.showMarket;render();" class="btn" style="width:100%;margin:8px 0;background:${state.showMarket?'#374151':'#2563eb'};color:#fff;">${state.showMarket?'Скрыть биржу ▲':'📈 Открыть биржу (купить акции) ▼'}</button>
                ${listHtml}
            </div>`;
        }

        // ─── 🎲 КАЗИНО (попытать удачу — проверка на жадность) ───
        // Выплаты по грани кубика = множитель ВОЗВРАТА от ставки (грань не в таблице → ставка сгорает).
        // Джекпот ×3 на 6 цепляет азарт, малый ×1.5 на 5 держит «почти-почти».
        // Матожидание ≈ −25% (дом в плюсе): выигрыш ~1 из 3 — чувствуется выигрышным, человек лудит дальше,
        // но на дистанции жадный проигрывает ВСЁ. Это и есть урок «лёгких денег в казино нет».
        // Дать банку доить сильнее (к 60%) → уменьшай числа (напр. {6:2}); мягче → увеличивай. Позже — ползунок в пульте.
        const CASINO_PAYOUT = { 6: 3, 5: 1.5 };
        // копилка статистики игрока (карточка-дашборд копит все действия для анализа)
        function pstat(p){ if(!p.stats) p.stats={casinoPlays:0,casinoWins:0,casinoLosses:0,casinoWon:0,casinoLost:0,buys:0,buyAmt:0,sells:0,sellAmt:0,salaryCount:0,salaryTotal:0}; return p.stats; }
        function gambleRoll(){
            const p=state.players.find(x=>x.id==state.currentPlayerId);
            if(!p) return;
            const el=document.getElementById('betAmt');
            const bet=Math.floor(Number(el? el.value : 0));
            if(!bet||bet<1){ alert('Введи ставку (число больше 0).'); return; }
            if(bet>p.savings){ alert('Не хватает кассы. У тебя '+Math.round(p.savings)+'$.'); return; }
            const roll=1+Math.floor(Math.random()*6);
            // ставка списывается СРАЗУ (committed). Проигрыш мгновенный.
            p.savings=Math.round((p.savings-bet)*100)/100;
            const st=pstat(p); st.casinoPlays++;
            const mult = CASINO_PAYOUT[roll] || 0;
            if(mult > 0){
                const payout=Math.round(bet*mult*100)/100;   // возврат (включает ставку)
                p.savings=Math.round((p.savings+payout)*100)/100;   // МГНОВЕННО: если выиграл — выиграл (без одобрения)
                st.casinoWins++; st.casinoWon=Math.round((st.casinoWon+(payout-bet))*100)/100;
                p.notify='🎰🎉 ВЫИГРЫШ ×'+mult+'! +'+Math.round(payout-bet)+'$ чистыми (вернулось '+payout+'$).';
                save(); render();
                const msg = roll===6
                    ? '🎰🎉 ШЕСТЁРКА!!! ДЖЕКПОТ ×'+mult+' → +'+payout+'$ СРАЗУ в кассу! 👑⭐'
                    : '🎲✨ Пятёрка! Выигрыш ×'+mult+' → +'+payout+'$ сразу в кассу!';
                alert(msg);
            } else {
                st.casinoLosses++; st.casinoLost=Math.round((st.casinoLost+bet)*100)/100;
                const near=['Так близко! 😤','Ещё чуть-чуть! 🎲','Удача уже рядом — чувствуешь? 🔥','Не сдавайся, фортуна любит упорных! 💪','В следующий раз точно шестёрка! 😏'];
                save(); render();
                alert('🎲 Выпало '+roll+'... '+near[Math.floor(Math.random()*near.length)]+'\n−'+bet+'$. Казино не спешит отдавать. Рискни ещё разок!');
            }
        }
        function clearNotify(){ const p=state.players.find(x=>x.id==state.currentPlayerId); if(p){ p.notify=null; save(); render(); } }
        function giveSalary(id){
            const p=state.players.find(x=>x.id==id); if(!p) return;
            const f=calc(p);
            const _st=pstat(p); _st.salaryCount++; _st.salaryTotal=Math.round((_st.salaryTotal+f.flow)*100)/100;   // копилка
            if (SERVER_MODE) {
                // Сервер-авторитет: начисление применяет сервер (атомарно под LOCK) и рассылает всем.
                // ОПТИМИСТИЧНО обновляем и локальный экран той же суммой — иначе экран ведущего остаётся
                // устаревшим (антизатирание 2.2с), и следующая правка (налог/касса) пошлёт старую сумму
                // и ЗАТРЁТ зарплату. Сервер применит ровно то же (broadcast заменит, не удвоит).
                state.players = state.players.map(x => x.id==id
                    ? {...x, savings: Math.round(((Number(x.savings)||0) + f.flow)*100)/100,
                       notify: (f.flow>=0
                         ? '💵 ЗАРПЛАТА! Ведущий начислил +'+f.flow+'$ (месячный поток). Касса пополнена! 🎉'
                         : '💸 Месяц в минус: '+f.flow+'$ (расходы выше дохода). Управляй потоком!')} : x);
                render();
                fetch('/salary', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ pid: id, flow: f.flow, txid: uid() })
                }).then(r=>{ if(!r.ok) alert('Зарплата не прошла — нажми ещё раз.'); })
                  .catch(e=>{ console.warn('salary error:', e); alert('Зарплата не прошла (сеть) — нажми ещё раз.'); });
                return;
            }
            // Локальный режим (без сервера) — как раньше.
            p.savings=Math.round((p.savings + f.flow)*100)/100;
            p.notify = (f.flow>=0
                ? '💵 ЗАРПЛАТА! Ведущий начислил +'+f.flow+'$ (месячный поток). Касса пополнена! 🎉'
                : '💸 Месяц в минус: '+f.flow+'$ (расходы выше дохода). Управляй потоком!');
            save(); render();
        }
        function renderLuckPanel(p){
            return `<div class="card" style="border:2px solid #a855f7;background:linear-gradient(135deg,rgba(168,85,247,0.18),rgba(236,72,153,0.10));">
                <div class="block-title" style="color:#e9d5ff;font-size:18px;letter-spacing:.5px;">🎰 ИСПЫТАЙ УДАЧУ</div>
                <p style="font-size:15px;color:#f5d0fe;font-weight:800;margin-bottom:2px;">Удача любит смелых! 🍀</p>
                <p style="font-size:13px;color:#e9d5ff;margin-bottom:8px;">Выпадет <b style="color:#fbbf24;">6</b> — джекпот <b style="color:#34d399;">×${CASINO_PAYOUT[6]}</b>! Выпадет <b style="color:#fbbf24;">5</b> — <b style="color:#34d399;">×${CASINO_PAYOUT[5]}</b>. Иначе ставка сгорает. 🚀<br>Кто не рискует — тот не пьёт шампанское 🍾</p>

        const TOK_COLORS=['#ef4444','#3b82f6','#22c55e','#111827','#f97316','#eab308','#a855f7','#ec4899','#f8fafc','#9ca3af','#06b6d4','#92400e'];

        function boardRoll(usePhysical){

            }
            fetch('/turn/roll',{method:'POST',headers:{'Content-Type':'application/json'},

        // ─── ТАЙМЕРЫ (Ф3): ход 2 мин мягкий, окно покупки 1 мин жёсткое ───
        function fmtLeft(endsAtSec){ const s=Math.max(0,Math.round(endsAtSec - Date.now()/1000)); const m=Math.floor(s/60); return m>0 ? (m+':'+String(s%60).padStart(2,'0')) : (s+'с'); }
        let _buyWasOpen=false;

            const tt=document.getElementById('turnTimer');

        // ─── 🤖 АВТОПРОГОН БОТОВ (видимая имитация игры для проверки; ускоренная скорость) ───
        function autoToast(msg, color){
            let el=document.getElementById('autoToast');
            if(!el){ el=document.createElement('div'); el.id='autoToast';
                el.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;background:#0b1020;border:2px solid #334155;color:#e9eefb;padding:10px 18px;border-radius:10px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:90vw;text-align:center;';

        function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
        async function autoBuyStock(p){
            const m=state.market; if(!m||!m.assets) return;
            const affordable=m.assets.filter(a=>a.price<=p.savings);
            if(!affordable.length) return;
            const a=affordable[Math.floor(Math.random()*affordable.length)];
            const q=Math.max(1, Math.floor((p.savings*0.3)/a.price));
            let fill=a.price;
            try{ const r=await fetch('/market/impact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({assetId:a.id,side:'buy',qty:q})}); const j=await r.json(); if(j&&j.avgFill) fill=j.avgFill; }catch(e){}
            const cost=Math.round(q*fill*100)/100; if(cost>p.savings) return;
            p.savings=Math.round((p.savings-cost)*100)/100;
            const st=pstat(p); st.buys++; st.buyAmt=Math.round((st.buyAmt+cost)*100)/100;
            p.holdings=p.holdings||{}; const h=p.holdings[a.id]||{qty:0,avg:0,name:a.name};
            h.avg=(h.avg*h.qty+fill*q)/(h.qty+q); h.qty+=q; h.name=a.name; p.holdings[a.id]=h;
            save(p.id); autoToast('🛒 '+p.name+' купил '+q+'×'+a.name+' по ~'+fill+'$', '#10b981');
        }
        function autoGamble(p){
            const bet=Math.max(50,Math.round((Number(p.savings)||0)*0.1)); if(bet>p.savings) return;
            p.savings=Math.round((p.savings-bet)*100)/100;
            const st=pstat(p); st.casinoPlays++;
            const roll=1+Math.floor(Math.random()*6); const mult=CASINO_PAYOUT[roll]||0;
            if(mult>0){ const win=Math.round(bet*mult*100)/100; p.savings=Math.round((p.savings+win)*100)/100;
                st.casinoWins++; st.casinoWon=Math.round((st.casinoWon+(win-bet))*100)/100;
                autoToast('🎰 '+p.name+' лудит: '+roll+' → +'+win+'$', '#a855f7'); }
            else { st.casinoLosses++; st.casinoLost=Math.round((st.casinoLost+bet)*100)/100;
                autoToast('🎰 '+p.name+' лудит: '+roll+' → −'+bet+'$', '#ef4444'); }
            save(p.id);
        }
        // упрощённый авто-резолв события клетки для бота (живые игроки — через карточки-модалки)
        const AUTO_EVENT={ career:['🎯 Карьера',0.05], skill:['💡 Навык',0.03], gov:['🏛️ Государство',-0.06],
            world:['🌍 Мир.событие',-0.04], work:['💼 Работа',0.04], expense:['💸 Расходы',-0.08],

        function autoResolveCard(p, key){
            const ev=AUTO_EVENT[key]; if(!ev){ p.allow=null; save(p.id); return; }
            const delta=Math.round((Number(p.savings)||0)*ev[1]);
            p.savings=Math.round(((Number(p.savings)||0)+delta)*100)/100; p.allow=null;
            autoToast(ev[0]+': '+p.name+' '+(delta>=0?'+':'')+delta+'$', delta>=0?'#10b981':'#ef4444'); save(p.id);
        }
        async function autoResolveCell(pid){
            const pp=state.players.find(x=>x.id==pid); if(!pp) return;

        let _autoTimer=null;

                const pid=b.order[b.turnIdx]; const p=state.players.find(x=>x.id==pid);
                if(p){
                    if((Number(p.jail)||0)>0){ autoGamble(p); await sleep(speed*0.6); boardNext(); }
                    else {
                        const val=1+Math.floor(Math.random()*6);
                        try{ await fetch('/turn/roll',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pid,value:val})}); }catch(e){}
                        await sleep(speed*0.6); await autoResolveCell(pid); await sleep(speed*0.4); boardNext();

            if(state.autoPlay && state.autoPlay.on) _autoTimer=setTimeout(autoStep, 300);

        // — ШАНС сменить профессию (по выбору игрока). ───
        function careerRoll(id) {
            if (!gate(id,'career')) return;
            const p = state.players.find(x => x.id === id);
            if (!p) return;
            if (!p.skills) p.skills = [];
            const hasLead = p.skills.some(s => s.key === 'lead');
            const changeChance = hasLead ? 6 : 3;
            const d100 = Math.floor(Math.random()*100) + 1;
            if (d100 <= changeChance) { offerProfessionChange(id); return; }
            const sk = CAREER_SKILLS[Math.floor(Math.random()*CAREER_SKILLS.length)];
            const curBonus = p.skills.reduce((s,x)=>s+(x.pct||0),0);
            if (curBonus >= 0.20) {
                p.notify = `🎓 Карьера (d100=${d100}): навык «${sk.name}», но бонус уже на капе +20% — прибавка не идёт, опыт записан.`;
            } else {
                p.skills.push({ key: sk.key, name: sk.name, pct: sk.pct });
                p.notify = `🎓 Карьера (d100=${d100}): навык «${sk.name}» (${sk.note}). Бонус навыков: +${Math.round(Math.min(0.20,curBonus+sk.pct)*100)}%.`;
            }
            if (sk.key === 'second') { save(); render(); offerProfessionChange(id); return; }
            save(); render();
        }

        function offerProfessionChange(id) {
            const p = state.players.find(x => x.id === id);
            if (!p) return;
            const opts = professionsDB.filter(pr => pr.name !== p.prof.name);
            const np = opts[Math.floor(Math.random()*opts.length)];
            const ok = confirm(`🔀 ШАНС СМЕНИТЬ ПРОФЕССИЮ!\n\nНовая: ${np.name} · з/п ${np.salary}$ (налог ${np.taxes}$)\nТекущая: ${p.prof.name} · з/п ${p.prof.salary}$\n\nПоменять? Касса, активы, долги и дети остаются — меняются зарплата и ставки расходов профессии.`);
            if (ok) {
                const old = p.prof.name; p.prof = np;
                p.notify = `🔀 Профессия изменена: ${old} → ${np.name}. Новая зарплата ${np.salary}$.`;
            } else {
                p.notify = `🔀 Шанс смены был — ты ОСТАЛСЯ: ${p.prof.name}.`;
            }
            save(); render();
        }

        function renderCareerPanel(p) {
            const f = calc(p);
            const bonusPct = Math.round((f.skillBonus||0)*100);
            const capped = (f.skillBonus||0) >= 0.20;
            const skillsHtml = (p.skills && p.skills.length)
                ? p.skills.map(s => `<span style="display:inline-block;background:#0b0f19;border:1px solid #334155;border-radius:6px;padding:2px 8px;margin:2px;font-size:11px;">${s.name} +${Math.round((s.pct||0)*100)}%</span>`).join('')
                : '<span style="color:#4b5563;font-size:12px;">Навыков пока нет</span>';
            return `
                <div class="card" style="border-color:#6366f1;">
                    <div class="block-title" style="color:#a5b4fc;">🎯 КАРЬЕРА (клетка после Зарплаты)</div>
                    <p style="font-size:12px;color:#9ca3af;margin-bottom:8px;">Попал на «Карьеру» → жми кубик. 97% — новый НАВЫК (+1-2% к зарплате, кап +20%); 3% (6% с Лидерством) — ШАНС сменить профессию (решаешь сам).</p>
                    <div style="margin-bottom:8px;">Бонус навыков: <b style="color:${capped?'#fbbf24':'#10b981'};">+${bonusPct}%${capped?' (кап)':''}</b> · база ${p.prof.salary}$ → <b style="color:#10b981;">${f.salary}$</b></div>
                    <div style="margin-bottom:10px;">${skillsHtml}</div>
                    <button onclick="careerRoll(${p.id})" class="btn" style="width:100%;background:#4f46e5;color:#fff;font-weight:800;font-size:14px;">🎲 КУБИК КАРЬЕРЫ</button>
                </div>
            `;
        }

        // ─── Клетка НАВЫК: окно с 5 картами (рубашкой вниз), выбираешь одну.
        // Шанс навыка = SKILL_CHANCE (10%), иначе пусто. «Вкладываешь в себя». ───
        const SKILL_CHANCE = 0.10;  // ← Rinat может менять процент здесь
        function openSkillModal(id) { if(!gate(id,'skill')) return; state.skillModal = { pId:id, revealed:null, gotKey:null }; render(); }
        function closeSkillModal() { state.skillModal = null; render(); }
        function pickSkillCard(idx) {
            const m = state.skillModal; if (!m || m.revealed !== null) return;
            const p = state.players.find(x => x.id === m.pId); if (!p) return;
            if (!p.lifeSkills) p.lifeSkills = {};
            if (Math.random() < SKILL_CHANCE) {
                const sk = LIFE_SKILLS[Math.floor(Math.random()*LIFE_SKILLS.length)];
                p.lifeSkills[sk.key] = (p.lifeSkills[sk.key]||0) + 1;
                m.gotKey = sk.key;
                p.notify = `💡 НАВЫК! Выпал «${sk.name}» — уровень ${p.lifeSkills[sk.key]}. (${sk.draft})`;
            } else {
                m.gotKey = null;
                p.notify = `💡 Навык: пусто (шанс был ${Math.round(SKILL_CHANCE*100)}%). В другой раз.`;
            }
            m.revealed = idx;
            save(); render();
        }
        function renderSkillModal() {
            const m = state.skillModal; if (!m) return '';
            const skName = m.gotKey ? ((LIFE_SKILLS.find(s=>s.key===m.gotKey)||{}).name || '') : '';
            const cards = [0,1,2,3,4].map(i => {
                let face='🂠', bg='#1e293b', label='';
                if (m.revealed !== null) {
                    if (i === m.revealed) {
                        if (m.gotKey) { face='💡'; bg='#065f46'; label=skName; }
                        else { face='✖'; bg='#374151'; label='Пусто'; }
                    } else { face='·'; bg='#0b0f19'; }
                }
                const click = m.revealed===null ? `onclick="pickSkillCard(${i})"` : '';
                const cur = m.revealed===null ? 'cursor:pointer;' : '';
                return `<div ${click} style="${cur}width:62px;height:90px;background:${bg};border:2px solid #475569;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;">${face}<div style="font-size:9px;color:#cbd5e1;margin-top:3px;text-align:center;line-height:1.1;">${label}</div></div>`;
            }).join('');
            const footer = m.revealed===null
                ? `<p style="color:#94a3b8;font-size:12px;margin-top:12px;">Выбери ОДНУ карту. Шанс навыка ${Math.round(SKILL_CHANCE*100)}%.</p>`
                : `<button onclick="closeSkillModal()" class="btn" style="margin-top:14px;background:#0284c7;color:#fff;font-weight:800;padding:8px 22px;">Закрыть</button>`;
            return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:2000;display:flex;align-items:center;justify-content:center;">
                <div style="background:#0f172a;border:1px solid #334155;border-radius:14px;padding:22px;max-width:420px;text-align:center;">
                    <div style="font-size:16px;font-weight:800;color:#7dd3fc;margin-bottom:10px;">💡 НАВЫК — вытяни карту</div>
                    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">${cards}</div>
                    ${footer}
                </div>
            </div>`;
        }
        function renderSkillPanel(p) {
            const ls = p.lifeSkills || {};
            const owned = LIFE_SKILLS.filter(s => ls[s.key]);
            const chips = owned.length
                ? owned.map(s=>`<span style="display:inline-block;background:#0b0f19;border:1px solid #334155;border-radius:6px;padding:2px 8px;margin:2px;font-size:11px;">${s.name} ур.${ls[s.key]} <span style="color:#64748b;">— ${s.draft}</span></span>`).join('')
                : '<span style="color:#4b5563;font-size:12px;">Навыков пока нет</span>';
            return `
                <div class="card" style="border-color:#0ea5e9;">
                    <div class="block-title" style="color:#7dd3fc;">💡 НАВЫК (вкладываешь в себя — не всегда про работу)</div>
                    <p style="font-size:12px;color:#9ca3af;margin-bottom:8px;">Клетка «Навык» → окно с 5 картами, выбери одну. Шанс получить навык ${Math.round(SKILL_CHANCE*100)}% (иначе пусто). Эффекты пока черновик.</p>
                    <div style="margin-bottom:10px;">${chips}</div>
                    <button onclick="openSkillModal(${p.id})" class="btn" style="width:100%;background:#0284c7;color:#fff;font-weight:800;font-size:14px;">🃏 КЛЕТКА «НАВЫК» (5 карт)</button>
                </div>
            `;
        }

        // ─── Клетка ГОСУДАРСТВО: налоги/сборы меняются со временем (1 год = 10 мин, как рынок).
        // ПРИНЦИП (Rinat): не крушить игру → капы + недостача кассы уходит в ДОЛГ банку (не в
        // минус-спираль). Обычно аккуратно; редко РЕЗКИЙ БУМ — больно, но выживаемо. ───
        let GAME_T0 = +(localStorage.getItem('via_t0') || 0);
        if (!GAME_T0) { GAME_T0 = Date.now(); try { localStorage.setItem('via_t0', GAME_T0); } catch(e){} }
        function govYears() { return Math.floor((Date.now() - GAME_T0) / (10*60*1000)); }
        function openGovModal(id) { if(!gate(id,'gov')) return; state.govModal = { pId:id, drawn:null }; render(); }
        function closeGovModal() { state.govModal = null; render(); }
        function drawGovCard() {
            const m = state.govModal; if (!m || m.drawn) return;
            const p = state.players.find(x => x.id === m.pId); if (!p) return;
            const yrReal = govYears();
            const yr = Math.min(yrReal, 15);
            const baseTax = p.prof.taxes;
            const TAXMOD_CAP = baseTax * 2;               // налоги не выше 3× базы (защита от краха)
            const pay = (amount) => {                     // касса не в минус: недостача → долг банку
                amount = Math.max(0, Math.round(amount));
                const fc = Math.min(amount, Math.max(0, Number(p.savings)||0));
                p.savings = (Number(p.savings)||0) - fc;
                const rest = amount - fc;
                if (rest > 0) p.bankLoan = (Number(p.bankLoan)||0) + rest;
                return rest;
            };
            const sal = p.prof.salary;
            const addTax = (delta) => { p.taxMod = Math.max(-baseTax, Math.min(TAXMOD_CAP, (Number(p.taxMod)||0) + Math.round(delta))); };
            const hasBiz = (p.assets||[]).some(a => a.type === 'BUSINESS');
            const note = (amt, rest) => `${amt}$${rest>0?` (кассы не хватило, ${rest}$ в долг банку)`:''}`;
            // КОЛОДА ГОСУДАРСТВА (14 событий). w = вес (частота). Все капы → игра не рушится.
            const E = [
                // 🟢 аккуратно (часто)
                { w:16, run:()=>{ const h=Math.max(10,Math.round(baseTax*(0.03+0.012*yr))); addTax(h); return {emoji:'🏛️',title:'Индексация налогов',text:`Инфляция: налоги +${h}$/мес (год ${yrReal}). Терпимо.`}; }},
                { w:15, run:()=>{ const fee=Math.max(30,Math.round(sal*0.04)); const r=pay(fee); return {emoji:'🧾',title:'Новый сбор',text:`Эко/утиль-сбор ${note(fee,r)} списан.`}; }},
                { w:14, run:()=>{ const up=Math.random()<0.5; const dlt=Math.max(10,Math.round(baseTax*0.04))*(up?1:-1); addTax(dlt); return {emoji:'⚖️',title:'Перерасчёт ставки',text:`Ставку ${up?'подняли':'снизили'}: налоги ${dlt>=0?'+':''}${dlt}$/мес.`}; }},
                // 🟡 заметно (разовое)
                { w:10, run:()=>{ const fee=Math.max(50,Math.round(sal*0.10)); const r=pay(fee); return {emoji:'📜',title:'Госпошлина/лицензия',text:`Оформление документов: ${note(fee,r)}.`}; }},
                { w:9,  run:()=>{ const fee=Math.max(40,Math.round(sal*(0.06+0.04*Math.random()))); const r=pay(fee); return {emoji:'🚓',title:'Штраф',text:`Админ-штраф ${note(fee,r)}.`}; }},
                { w:8,  run:()=>{ const fee=Math.max(60,Math.round(sal*(0.12+0.04*yr/15))); const r=pay(fee); return {emoji:'🔍',title:'Налоговая проверка',text:`Проверка по доходу: штраф ${note(fee,r)}.`}; }},
                { w:6,  run:()=>{ const fee=hasBiz?Math.max(150,Math.round(sal*0.25)):Math.max(40,Math.round(sal*0.05)); const r=pay(fee); return {emoji:'🏢',title:'Лицензия дороже',text:hasBiz?`Перелицензирование бизнеса: ${note(fee,r)}.`:`Сбор за разрешение ${note(fee,r)}.`}; }},
                // 🔴 резкий бум (редко, выживаемо)
                { w:5,  run:()=>{ const h=Math.max(50,Math.round(baseTax*(0.18+0.03*yr))); const before=Number(p.taxMod)||0; addTax(h); const got=(Number(p.taxMod)||0)-before; return {emoji:'💥',title:'Налоговая реформа',text:`Крупный рост: налоги +${got}$/мес. Держись.`}; }},
                { w:4,  run:()=>{ const h=Math.max(40,Math.round(baseTax*0.12)); addTax(h); const cap=Math.round(Math.max(0,Number(p.savings)||0)*0.5+sal*0.5); const f=Math.min(Math.round(sal*(0.25+0.05*yr)),Math.max(sal,cap)); const r=pay(f); return {emoji:'📉',title:'Кризис/девальвация',text:`Налоги +${h}$/мес и сбор ${note(f,r)}. Выкарабкивайся.`}; }},
                { w:3,  run:()=>{ const cap=Math.round(Math.max(0,Number(p.savings)||0)*0.5+sal*0.6); const f=Math.min(Math.round(sal*(0.30+0.05*yr)),Math.max(sal,cap)); const r=pay(f); return {emoji:'🧮',title:'Доначисление налоговой',text:`Доначислили ${note(f,r)}.`}; }},
                // ✨ повезло (редко)
                { w:3,  run:()=>{ const back=Math.max(15,Math.round(baseTax*0.18)); addTax(-back); return {emoji:'✨',title:'Налоговая льгота',text:`Вычет: налоги −${back}$/мес. Повезло!`}; }},
                { w:3,  run:()=>{ const b=Math.max(80,Math.round(sal*0.15)); p.savings=(Number(p.savings)||0)+b; return {emoji:'💸',title:'Субсидия/пособие',text:`Господдержка +${b}$ в кассу.`}; }},
                { w:2,  run:()=>{ const cut=Math.min(Number(p.bankLoan)||0,Math.max(100,Math.round(sal*0.5))); p.bankLoan=(Number(p.bankLoan)||0)-cut; return {emoji:'🕊️',title:'Налоговая амнистия',text:cut>0?`Списали ${cut}$ долга банку!`:`Амнистия — но долгов нет, повезло без выгоды.`}; }},
                { w:2,  run:()=>{ const kids=Number(p.children)||0; if(kids>0){ const b=kids*Math.max(100,Math.round(sal*0.12)); p.savings=(Number(p.savings)||0)+b; return {emoji:'👶',title:'Маткапитал',text:`За детей (${kids}) +${b}$ в кассу.`}; } const b=Math.max(50,Math.round(sal*0.08)); p.savings=(Number(p.savings)||0)+b; return {emoji:'🎁',title:'Соцвыплата',text:`Детей нет — но дали ${b}$.`}; }}
            ];
            const total = E.reduce((s,e)=>s+e.w,0);
            let rr = Math.random()*total, ev = E[0];
            for (const e of E) { if ((rr -= e.w) < 0) { ev = e; break; } }
            const res = ev.run();
            m.drawn = res;
            p.notify = `🏛️ Государство: ${res.title} — ${res.text}`;
            save(); render();
        }
        function renderGovModal() {
            const m = state.govModal; if (!m) return '';
            if (!m.drawn) {
                return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:2000;display:flex;align-items:center;justify-content:center;">
                    <div style="background:#0f172a;border:1px solid #334155;border-radius:14px;padding:24px;max-width:380px;text-align:center;">
                        <div style="font-size:16px;font-weight:800;color:#fcd34d;margin-bottom:14px;">🏛️ ГОСУДАРСТВО — вытяни карту</div>
                        <div onclick="drawGovCard()" style="cursor:pointer;width:120px;height:170px;margin:0 auto;background:linear-gradient(135deg,#92400e,#b45309);border:2px solid #f59e0b;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:54px;">🏛️</div>
                        <p style="color:#94a3b8;font-size:12px;margin-top:12px;">Нажми на карту, чтобы вытянуть. Событие касается ТОЛЬКО тебя.</p>
                    </div>
                </div>`;
            }
            const dr = m.drawn;
            return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;display:flex;align-items:center;justify-content:center;">
                <div style="background:#0f172a;border:1px solid #f59e0b;border-radius:14px;padding:24px;max-width:400px;text-align:center;">
                    <div style="font-size:48px;">${dr.emoji}</div>
                    <div style="font-size:17px;font-weight:800;color:#fcd34d;margin:6px 0;">${dr.title}</div>
                    <p style="color:#e5e7eb;font-size:14px;line-height:1.45;margin-bottom:16px;">${dr.text}</p>
                    <button onclick="closeGovModal()" class="btn" style="background:#d97706;color:#fff;font-weight:800;padding:8px 24px;">Закрыть</button>
                </div>
            </div>`;
        }
        function renderGovPanel(p) {
            const f = calc(p); const yr = govYears(); const mod = Number(p.taxMod)||0;
            return `
                <div class="card" style="border-color:#f59e0b;">
                    <div class="block-title" style="color:#fcd34d;">🏛️ ГОСУДАРСТВО (налоги и сборы)</div>
                    <p style="font-size:12px;color:#9ca3af;margin-bottom:8px;">Попал на клетку → вытяни карту, она зачитает что случилось (только тебе). Налоги растут со временем. Год игры: <b style="color:#fcd34d;">${yr}</b>. Игра не рушится: капы + долг вместо вайпа.</p>
                    <div style="margin-bottom:10px;">Налоги: база ${p.prof.taxes}$ ${mod>=0?'+':''}${mod}$ = <b style="color:${mod>0?'#ef4444':(mod<0?'#10b981':'#e5e7eb')};">${f.taxes}$/мес</b></div>
                    <button onclick="openGovModal(${p.id})" class="btn" style="width:100%;background:#d97706;color:#fff;font-weight:800;font-size:14px;">🏛️ ВЫТЯНУТЬ КАРТУ ГОСУДАРСТВА</button>
                </div>
            `;
        }

        // ─── Клетка РЫНОК / МИРОВЫЕ СОБЫТИЯ: ГЛОБАЛЬНО (на ВСЕХ игроков), карту видят
        // ВСЕ мониторы. Не ломать игру: крахи бьют по СТОИМОСТИ активов (отрастёт), касса
        // не уходит в минус, налоги капнуты. Эффект применяется ко всем p в state.players. ───
        const wStocks = (ps, f) => ps.forEach(p => (p.assets||[]).forEach(a => { if (a.type==='STOCK') a.now = Math.max(1, Math.round((a.now||a.price||1)*f)); }));
        const wOther  = (ps, f) => ps.forEach(p => (p.assets||[]).forEach(a => { if (a.type==='OTHER') a.now = Math.max(1, Math.round((a.now||a.price||1)*f)); }));
        const wBiz    = (ps, f) => ps.forEach(p => (p.assets||[]).forEach(a => { if (a.type==='BUSINESS') a.cf = Math.max(0, Math.round((a.cf||0)*f)); }));
        const wCash   = (ps, fn) => ps.forEach(p => { p.savings = Math.max(0, (Number(p.savings)||0) + Math.round(fn(p))); });
        const wTax    = (ps, d) => ps.forEach(p => { const cap=p.prof.taxes*2; p.taxMod = Math.max(-p.prof.taxes, Math.min(cap, (Number(p.taxMod)||0)+Math.round(d))); });
        const WORLD_EVENTS = [
            // 🟢 бумы/хорошее
            { w:7, emoji:'🚀', title:'Технологический бум',  text:'Биржа взлетела: акции +15% у всех.',                 apply:ps=>wStocks(ps,1.15) },
            { w:6, emoji:'🤖', title:'Прорыв в AI',          text:'Автоматизация: доход бизнесов +10% у всех.',         apply:ps=>wBiz(ps,1.10) },
            { w:6, emoji:'📈', title:'Экономический рост',    text:'Подъём: акции +10% у всех.',                          apply:ps=>wStocks(ps,1.10) },
            { w:5, emoji:'💵', title:'Господдержка/стимул',   text:'Стимулы населению: всем +0.5 зарплаты в кассу.',      apply:ps=>wCash(ps,p=>p.prof.salary*0.5) },
            { w:5, emoji:'⛽', title:'Сырьевой бум',          text:'Сырьё/ценности дорожают: прочие активы +12%.',       apply:ps=>wOther(ps,1.12) },
            // 🔴 кризисы
            { w:7, emoji:'📉', title:'Мировой кризис',        text:'Биржа рухнула: акции −20%. Держи актив — отрастёт.', apply:ps=>wStocks(ps,0.80) },
            { w:6, emoji:'🦠', title:'Пандемия (вирус)',      text:'Локдаун: доход бизнесов −20% и мед-расход у всех.',   apply:ps=>{ wBiz(ps,0.80); wCash(ps,p=>-p.prof.salary*0.2); } },
            { w:5, emoji:'⚔️', title:'Военный конфликт',      text:'Нестабильность: акции −10% и военный налог +20$/мес всем.', apply:ps=>{ wStocks(ps,0.90); wTax(ps,20); } },
            { w:5, emoji:'🔥', title:'Инфляция',              text:'Цены растут: налоги всем +15$/мес.',                  apply:ps=>wTax(ps,15) },
            { w:5, emoji:'🏦', title:'Банковский кризис',     text:'Банки шатает: с кассы у всех −10% (не в минус).',     apply:ps=>wCash(ps,p=>-(Number(p.savings)||0)*0.10) },
            { w:5, emoji:'₿', title:'Крах крипты',            text:'Спекулятив падает: прочие активы −25%.',              apply:ps=>wOther(ps,0.75) },
            { w:4, emoji:'🌪️', title:'Природная катастрофа',  text:'Стихия: всем разовый расход ~0.3 зарплаты.',          apply:ps=>wCash(ps,p=>-p.prof.salary*0.3) },
            { w:4, emoji:'🔌', title:'Энергокризис',          text:'Дорогая энергия: бизнесы −10%, акции −5%.',           apply:ps=>{ wBiz(ps,0.90); wStocks(ps,0.95); } },
            // ✨ редкие плюсы
            { w:3, emoji:'🧬', title:'Прорыв в медицине',     text:'Здоровье и продуктивность: бизнесы +12%, всем +0.2 зарплаты.', apply:ps=>{ wBiz(ps,1.12); wCash(ps,p=>p.prof.salary*0.2); } },
            { w:3, emoji:'🕊️', title:'Мир и стабильность',    text:'Глобальная стабильность: акции +8% и налоги всем −10$/мес.', apply:ps=>{ wStocks(ps,1.08); wTax(ps,-10); } },
            { w:3, emoji:'💎', title:'Открытие месторождения', text:'Ресурсный джекпот: прочие активы +20%.',              apply:ps=>wOther(ps,1.20) },
            // 🟢 ещё бумы

        function resolvePassiveCard(pid, card){
            const p = state.players.find(x=>x.id==pid); if(!p) return;
            const parts=[];
            if(card.pct){ const loss=Math.round((Number(p.savings)||0)*card.pct/100); p.savings=Math.round(((Number(p.savings)||0)-loss)*100)/100; parts.push(`−${loss}$ (${card.pct}% наличных)`); }
            if(card.cash){ p.savings=Math.round(((Number(p.savings)||0)-card.cash)*100)/100; parts.push(`−${card.cash}$ сразу`); }

            if(card.tax){ p.taxMod=(Number(p.taxMod)||0)+card.tax; parts.push(`+${card.tax}$ к налогам`); }
            if(card.taxPct){ p.taxPct=(Number(p.taxPct)||0)+card.taxPct; parts.push(`+${card.taxPct}% к налогам`); }
            const text = (parts.join(', ')||'нет эффекта') + (card.note?`. ${card.note}`:'');
            p.notify = `📕 Пассив «${card.t}»: ${text}`;

            const p=state.players.find(x=>x.id==pid); if(!p) return;
            const parts=[]; let delta=0;
            if(card.roll==='ruletka'){ const r=1+Math.floor(Math.random()*6); delta=r<=2?-300:r<=4?0:600; parts.push(`кубик ${r} → ${delta>=0?'+':''}${delta}$`); }
            else if(card.roll==='sluhi'){ const r=1+Math.floor(Math.random()*6); delta=r<=2?-100:r<=4?0:200; parts.push(`кубик ${r} → ${delta>=0?'+':''}${delta}$`); }

            if(typeof card.cash==='number'){ delta+=card.cash; parts.push(`${card.cash>=0?'+':''}${card.cash}$`); }
            if(delta) p.savings=Math.round(((Number(p.savings)||0)+delta)*100)/100;
            if(card.salary){ p.prof.salary=(Number(p.prof.salary)||0)+card.salary; parts.push(`+${card.salary}$/мес к зарплате навсегда`); }
            const color=delta>0?'#34d399':delta<0?'#f87171':'#a78bfa';
            const text=(parts.join(', ')||'—')+(card.note?`. ${card.note}`:'');
            p.notify=`🎫 Событие «${card.t}»: ${text}`;

        function applyQRCard(type){

            if(type==='ticket'){ showCardPreview(pid,type); return; }
            if(type==='child'){ showCardPreview(pid,type); return; }
            // РЕАЛЬНАЯ карта-актив (Малые активы): скан asset_<id> → офер покупки ИМЕННО этой карты
            if(String(type).startsWith('asset_')){

                render();
                return;
            }
            // КРУПНЫЕ СДЕЛКИ: скан big_<id> → офер покупки именно этой крупной сделки
            if(String(type).startsWith('big_')){
                const gid = parseInt(String(type).slice(4),10);

                render();
                return;
            }
            // ЧЁРНЫЙ РЫНОК: скан → предпросмотр карты → применить
            if(String(type).startsWith('black_')){ showCardPreview(pid,type); return; }
            // ПАССИВЫ: скан → предпросмотр карты → применить
            if(String(type).startsWith('passive_')){ showCardPreview(pid,type); return; }
            // РЫНОК: скан market_<id> → предложение продать объект по рыночной цене

                state.view='player';

            // СОБЫТИЯ: скан → предпросмотр карты → применить

            if(!spec){ alert('Неизвестная карта в QR: '+type); return; }
            const [key, openName, drawName] = spec;
            state.players = state.players.map(x=>x.id==pid ? {...x, allow:key} : x);  // карту выдал ведущий = доверенно
            state.view='player'; render();
            window[openName](pid);   // пройдёт gate (allow=key), откроет модалку
            window[drawName]();      // авто-тянет и применяет эффект
        }
        // ─── 📷 ВСТРОЕННЫЙ СКАНЕР QR (камера прямо в игре, не выходя в отдельное приложение) ───
        let _scanStream=null, _scanRAF=null, _scanOverlay=null;
        async function startScan(){
            if(!('BarcodeDetector' in window)){
                alert('Твой браузер не умеет сканировать внутри игры. Наведи на QR обычной камерой телефона — карта тоже откроется.');
                return;
            }
            let stream;
            try{ stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}}); }
            catch(e){ alert('Камера недоступна: '+(e.message||e)); return; }
            _scanStream=stream;
            _scanOverlay=document.createElement('div');   // оверлей ВНЕ render — broadcast не снесёт видео
            _scanOverlay.style.cssText='position:fixed;inset:0;z-index:5000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;';
            const video=document.createElement('video'); video.setAttribute('playsinline',''); video.muted=true;
            video.style.cssText='width:100%;max-width:460px;border-radius:12px;border:2px solid #22d3ee;';
            const hint=document.createElement('div'); hint.textContent='📷 Наведи на QR-код карты'; hint.style.cssText='color:#fff;font-weight:800;margin-bottom:12px;font-size:16px;';
            const btn=document.createElement('button'); btn.textContent='✕ Закрыть'; btn.onclick=stopScan;
            btn.style.cssText='margin-top:16px;padding:12px 28px;border:none;border-radius:10px;background:#ef4444;color:#fff;font-weight:800;font-size:15px;';
            _scanOverlay.appendChild(hint); _scanOverlay.appendChild(video); _scanOverlay.appendChild(btn);
            document.body.appendChild(_scanOverlay);
            video.srcObject=stream; try{ await video.play(); }catch(e){}
            const det=new BarcodeDetector({formats:['qr_code']});
            const tick=async()=>{
                if(!_scanStream) return;
                try{ const codes=await det.detect(video); if(codes&&codes.length){ const raw=codes[0].rawValue||''; stopScan(); handleScannedQR(raw); return; } }catch(e){}
                _scanRAF=requestAnimationFrame(tick);
            };
            _scanRAF=requestAnimationFrame(tick);
        }
        function stopScan(){
            if(_scanRAF){ cancelAnimationFrame(_scanRAF); _scanRAF=null; }
            if(_scanStream){ _scanStream.getTracks().forEach(t=>t.stop()); _scanStream=null; }
            if(_scanOverlay){ _scanOverlay.remove(); _scanOverlay=null; }
        }
        function handleScannedQR(raw){
            let card=null;
            try{ card=new URL(raw).searchParams.get('card'); }catch(e){}
            if(!card && /^[a-z_]+$/i.test((raw||'').trim())) card=(raw||'').trim();
            if(!card){ alert('Это не карта VIA: '+raw); return; }
            applyQRCard(card);
        }

        function appr(dId) {
            const d = state.deals.find(dl => dl.id == dId); if (!d) return;
            state.players = state.players.map(p => {
                if (p.id != d.pId) return p;
                if (d.type === 'BUY_ASSET') p.assets.push({ ...d.details, id: Date.now() });
                else if (d.type === 'SELL_ASSET') p.assets = p.assets.filter(a => a.id != d.details.aId);
                else if (d.type === 'SELL_MARKET') {
                    const dd = d.details;
                    if (p.holdings && p.holdings[dd.assetId]) {
                        const sq = Math.min(dd.qty, p.holdings[dd.assetId].qty);
                        p.savings = Math.round(((p.savings || 0) + sq * dd.price) * 100) / 100;
                        p.holdings[dd.assetId].qty -= sq;
                        if (p.holdings[dd.assetId].qty <= 0) delete p.holdings[dd.assetId];
                    }
                }
                else if (d.type === 'SELL_STOCK') {
                    const dd = d.details;
                    const total = dd.sellQty * dd.price;
                    p.savings = (p.savings || 0) + total;
                    p.assets = p.assets.map(a => {
                        if (a.id != dd.aId) return a;
                        const newQty = a.qty - dd.sellQty;
                        if (newQty <= 0) return null;
                        return { ...a, qty: newQty, cf: Math.round(a.price * newQty * (a.div||0) / 100) };
                    }).filter(Boolean);
                }
                else if (d.type === 'PAY_MORTGAGE') { p.isM = true; p.mLeft = 0; }
                else if (d.type === 'PAY_EDU') { p.isE = true; p.eLeft = 0; }
                else if (d.type === 'PAY_AUTO') { p.isA = true; p.aLeft = 0; }
                else if (d.type === 'PAY_CC') { p.isCC = true; p.ccLeft = 0; }
                else if (d.type === 'PAY_RETAIL') { p.isR = true; p.rLeft = 0; }
                else if (d.type === 'CASINO_WIN') {
                    p.savings = Math.round(((p.savings||0) + d.details.payout) * 100) / 100;
                    p.notify = '🎉 ПОЗДРАВЛЯЕМ! Ведущий подтвердил твой выигрыш +' + d.details.payout + '$! 👑 Касса пополнена.';
                }
                else if (d.type === 'PAY_BANK') p.bankLoan = 0;
                else if (d.type === 'TAKE_LOAN') { p.bankLoan += d.details.amount; p.savings += d.details.amount; }
                return p;
            });
            state.deals = state.deals.filter(dl => dl.id != dId);
            save(); render();
        }

        // ─── БАЗА КАРТОЧЕК ПАССИВА (ведущий выдаёт — пассив появляется автоматически) ───

        function giveCard(pId, idx) {
            const c = CARDS[Number(idx)]; if (!c) return;
            state.players = state.players.map(p => {
                if (p.id != pId) return p;
                const assets = (p.assets || []).concat([{ title: c.name, type: c.type, price: c.cost, down: c.cost, cf: c.cf, fromCard: true }]);
                return { ...p, assets };
            });
            save(); render();
        }

        // ─── МИНУС-КАРТОЧКИ (реальная колода Рината: мошенники / платежи / потеря налички) ───
        // hit=сразу минус $ с кассы; hitPct=сразу минус % кассы; monthly=+$ в расход навсегда; taxAdd=+$ налог; taxPctAdd=+% налог
        const MINUS_CARDS = [
            {name:'🕵 Мошенники: фейк-инвестпроект', hit:300, monthly:40},
            {name:'🕵 Мошенники: взломали карту', hit:200, monthly:25},
            {name:'🕵 Мошенники: поддельный ремонтник', hit:250, monthly:30},
            {name:'🏠 Аренда квартиры', monthly:1000},
            {name:'💡 Коммунальные услуги', monthly:150},
            {name:'📱 Телефон и интернет', monthly:60},
            {name:'💊 Медицина и лекарства', monthly:120},
            {name:'💳 Кредитная карта (платёж)', monthly:80},
            {name:'🍔 Питание и продукты', monthly:400},
            {name:'⛽ Транспорт и бензин', monthly:200},
            {name:'👕 Одежда и уход', monthly:120},
            {name:'📺 Подписки и сервисы', monthly:50},
            {name:'🍺 Алкоголь/сигареты/развлечения', monthly:180},
            {name:'🛍 Импульсивные покупки', monthly:90},
            {name:'🚗 Штраф за парковку', monthly:50},
            {name:'🏥 Медицинская страховка', monthly:70},
            {name:'💻 Потерял деньги в интернете', monthly:40},
            {name:'📉 Осторожный инвестор (комиссии)', monthly:30},
            {name:'🏦 Лишний кредитный процент', monthly:60},
            {name:'🦷 Лечение зубов', monthly:90},
            {name:'🔧 Ремонт телефона', monthly:35},
            {name:'☕ Кофе на ноутбук', monthly:50},
            {name:'🏠 Страховка имущества', monthly:80},
            {name:'💡 Повышение коммуналки', monthly:60},
            {name:'🧾 Налог фиксированный +200$', taxAdd:200},
            {name:'🧾 Налоговая корректировка +100$', taxAdd:100},
            {name:'💎 Налог на роскошь +2%', taxPctAdd:2},
            {name:'👛 Потерял кошелёк (−10% кассы)', hitPct:10},
            {name:'🚌 Украли в транспорте (−15% кассы)', hitPct:15},
        ];
        function minusEffect(c) {
            const a = [];
            if (c.hit) a.push('−' + c.hit + '$ сразу');
            if (c.hitPct) a.push('−' + c.hitPct + '% кассы сразу');
            if (c.monthly) a.push('+' + c.monthly + '$/мес расход');
            if (c.taxAdd) a.push('+' + c.taxAdd + '$ налог');
            if (c.taxPctAdd) a.push('+' + c.taxPctAdd + '% налог');
            return a.join(' · ');
        }
        function giveMinus(pId, idx) {
            const c = MINUS_CARDS[Number(idx)]; if (!c) return;
            state.players = state.players.map(p => {
                if (p.id != pId) return p;
                const np = { ...p };
                const cash = Number(np.savings) || 0;
                np.savings = Math.round((cash - (c.hit || 0) - (c.hitPct ? cash * c.hitPct / 100 : 0)) * 100) / 100;
                if (c.monthly) np.expMod = (Number(np.expMod) || 0) + c.monthly;
                if (c.taxAdd) np.taxMod = (Number(np.taxMod) || 0) + c.taxAdd;
                if (c.taxPctAdd) np.taxPct = (Number(np.taxPct) || 0) + c.taxPctAdd;
                return np;
            });
            save(); render();
        }
        // ─── ТЮРЬМА (ведущий): сажает игрока на N ходов; игрок пропускает ходы ───
        // При посадке в тюрьму (0→>0) считаем jailCount (сколько раз сидел за игру)
        function setJail(id, n) {
            state.players = state.players.map(p => {
                if (p.id != id) return p;
                const wasFree = (Number(p.jail)||0) === 0;
                const nn = Math.max(0, Math.round(n));
                const jc = (wasFree && nn>0) ? (Number(p.jailCount)||0)+1 : (Number(p.jailCount)||0);
                return {...p, jail: nn, jailCount: jc};
            });
            save(); render();
        }
        function jailDec(id) { state.players = state.players.map(p => p.id==id ? {...p, jail: Math.max(0, (Number(p.jail)||0)-1)} : p); save(); render(); }
        function jailFree(id) { state.players = state.players.map(p => p.id==id ? {...p, jail: 0} : p); save(); render(); }
        // Откуп РАСТЁТ: 1-й раз 30%, 2-й 40%, 3-й 50%… +10% за каждое попадание (до 90%). Ведущий тоже может «Освободить».
        function jailBuyoutPct(p){ const times = Math.max(1, Number(p.jailCount)||1); return Math.min(90, 30 + (times-1)*10); }
        function jailBuyout(id) {
            const p = state.players.find(x => x.id == id); if (!p) return;
            const times = Math.max(1, Number(p.jailCount)||1);
            const pct = jailBuyoutPct(p);
            const cost = Math.round((Number(p.savings)||0) * pct / 100);
            if (!confirm(`Откупиться из тюрьмы за ${pct}% кассы (−${cost}$)? Это ${times}-й раз в тюрьме — чем чаще сидишь, тем дороже. Выйдешь сразу.`)) return;
            state.players = state.players.map(x => x.id==id
                ? {...x, savings: Math.round(((Number(x.savings)||0) - cost)*100)/100, jail: 0} : x);
            save(id); render();
        }
        // ─── РАЗРЕШЕНИЯ: кнопки клеток у игрока закрыты, пока ведущий не откроет КОНКРЕТНУЮ
        // клетку (p.allow = ключ). gate() проверяет+СЪЕДАЕТ разрешение (одноразовое). ───
        const ALLOW_LABEL = { career:'🎯 Карьера', skill:'💡 Навык', gov:'🏛️ Государство', world:'🌍 Мировое событие', work:'💼 Работа', expense:'💸 Расходы', tax:'🏦 Налоги', svyaz:'🌐 Связи', sdelka:'🤝 Сделки', med:'⚕️ Медицина' };
        function setAllow(id, key) { state.players = state.players.map(p => p.id==id ? {...p, allow:key} : p); save(); render(); }
        function gate(id, key) {
            const p = state.players.find(x => x.id === id);
            if (!p) return false;
            if ((Number(p.jail)||0) > 0) { alert('🔒 Ты в тюрьме — доступна только лудка (казино). Отбывай ходы или откупись.'); return false; }
            if (p.allow !== key) { alert('🔒 Жди — ведущий должен ОТКРЫТЬ тебе эту клетку.'); return false; }
            p.allow = null; save();   // одноразовое: разрешение потрачено
            return true;
        }

        function deletePlayer(id, name) {
            if (!confirm(`Удалить игрока "${name}" полностью?\n\nВсе его активы, долги и заявки также будут удалены. Это действие необратимо.`)) return;
            state.players = state.players.filter(p => p.id != id);
            state.deals = state.deals.filter(d => d.pId != id);  // clean up pending deals too
            save(); render();
        }

        function clearAllPlayers() {
            if (!confirm(`ОЧИСТКА СТОЛА: удалить ВСЕХ ${state.players.length} игроков и все заявки?\n\nЭто действие необратимо.`)) return;
            if (!confirm('Точно? Это удалит ВСЁ.')) return;
            state.players = [];
            state.deals = [];
            save(); render();
        }

        // ═══════ SYNC между вкладками — 4 канала надёжности ═══════
        // 1) BroadcastChannel — мгновенный, работает в file:// для same-origin
        if (bc) {
            bc.addEventListener('message', () => { reloadFromStorage(); safeRerender(); });
        }
        // 2) storage event (резерв)
        window.addEventListener('storage', (e) => {
            if (e.key === 'v0_players' || e.key === 'v0_deals') { reloadFromStorage(); safeRerender(); }
        });
        // 3) focus / visibilitychange — когда возвращаешься на вкладку
        window.addEventListener('focus', () => { reloadFromStorage(); safeRerender(); });
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) { reloadFromStorage(); safeRerender(); }
        });
        // 4) ГАРАНТИРОВАННЫЙ polling localStorage (только в file:// режиме)
        if (!SERVER_MODE) {
            lastDataHash = dataHash();
            setInterval(() => {
                const h = dataHash();
                if (h !== lastDataHash) {
                    lastDataHash = h;
                    reloadFromStorage();
                    safeRerender();
                }
            }, 1500);
        }

        // Запуск: сначала подтягиваем серверные данные (если SERVER_MODE), потом рендерим
        (async () => {
            if (SERVER_MODE) {
                await pollServer();
                startSSE();                      // мгновенный push — главный канал
                setInterval(pollServer, 3000);   // страховка на случай обрыва провода
            }
            const _qr = new URLSearchParams(location.search).get('card');
            if (_qr) { state.pendingQR = _qr; }   // пришли по QR-ссылке ?card=<тип>
            render();
            if (state.pendingQR && state.currentPlayerId) applyQRCard(state.pendingQR);
            if (document.getElementById('assetFields')) renderAssetForm();
        })();
