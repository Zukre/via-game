<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIA GAME</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root{ --lx-gold:#d9b877; --lx-gold-br:#efd8a3; --lx-gold-ln:rgba(217,184,119,.20);
               --lx-panel:#14171e; --lx-panel2:#171b23; --lx-ink:#0d1016; --lx-line:#242833;
               --lx-text:#f3efe6; --lx-muted:#9c988e; --lx-faint:#6d6a62; --lx-em:#5cb08b; --lx-rose:#cf9a9a; }
        body {
            background:
              radial-gradient(1100px 560px at 50% -12%, rgba(217,184,119,.06), transparent 62%),
              #0a0c10;
            color: var(--lx-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 18px;
        }
        .container { max-width: 1080px; margin: 0 auto; }

        .card {
            background: linear-gradient(180deg,var(--lx-panel2),var(--lx-panel));
            border: 1px solid var(--lx-line);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 34px rgba(0,0,0,0.35);
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 16px; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 16px; margin-bottom: 16px; }

        .stat-box { border-radius: 10px; padding: 18px; border: 1px solid #1f2937; }
        .stat-blue { background: rgba(30, 58, 138, 0.2); border-color: #2563eb; }
        .stat-rose { background: rgba(153, 27, 27, 0.2); border-color: #dc2626; }
        .stat-emerald { background: rgba(6, 78, 59, 0.2); border-color: #059669; }
        .stat-amber { background: rgba(120, 53, 15, 0.25); border-color: #d97706; }
        .val-blue { color: #3b82f6; font-size: 24px; font-weight: 800; }
        .val-rose { color: #ef4444; font-size: 24px; font-weight: 800; }
        .val-emerald { color: #10b981; font-size: 24px; font-weight: 800; }
        .val-amber { color: #fbbf24; font-size: 24px; font-weight: 800; }

        .block-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--lx-muted);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            border-bottom: 1px solid var(--lx-gold-ln);
            padding-bottom: 10px;
            margin-bottom: 14px;
        }

        .inp {
            background: var(--lx-ink);
            border: 1px solid var(--lx-line);
            border-radius: 10px;
            padding: 11px 13px;
            color: var(--lx-text);
            width: 100%;
            font-size: 14px;
        }
        .inp:focus { border-color: var(--lx-gold-ln); outline: none; box-shadow:0 0 0 3px rgba(217,184,119,.08); }
        select.inp { cursor: pointer; }

        .btn {
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.18s;
        }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: linear-gradient(180deg,var(--lx-gold-br),var(--lx-gold)); color:#20180a; width: 100%; padding: 13px; font-size: 14px; box-shadow:0 8px 22px rgba(217,184,119,.20); }
        .btn-amber { background: #d97706; color: white; }
        .btn-orange { background: #ea580c; color: white; font-size: 11px; text-transform: uppercase; padding: 6px 12px; }
        .btn-gray { background: var(--lx-panel); color: var(--lx-text); border:1px solid var(--lx-line); }
        .btn-gray:hover { border-color: var(--lx-gold-ln); color: var(--lx-gold-br); filter:none; }
        .btn:hover { filter: brightness(1.08); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 13px;
            background: var(--lx-ink);
            border-radius: 10px;
            margin-bottom: 7px;
            font-size: 13.5px;
            border: 1px solid var(--lx-line);
        }
        .strike { text-decoration: line-through; opacity: 0.35; }

        .player-card {
            background: #111827; border: 1px solid #1f2937; padding: 14px; border-radius: 10px; margin-bottom: 8px; cursor: pointer;
        }
        .player-card:hover { border-color: #3b82f6; background: #1f2937; }

        .win-box { background: rgba(17, 24, 39, 0.6); border: 2px solid #1f2937; text-align: center; }
        .win-active { border-color: #10b981; background: rgba(6, 78, 59, 0.1); }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 6px;
        }
        .b-blue { background: #1e3a8a; color: #93c5fd; }
        .b-green { background: #064e3b; color: #6ee7b7; }
        .b-amber { background: #78350f; color: #fcd34d; }
        .b-rose { background: #7f1d1d; color: #fca5a5; }

        .sub-section {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #1f2937;
        }
        .sub-label {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.4px;
        }
        .pending-alert {
            background: #78350f;
            border: 1px solid #d97706;
            color: #fcd34d;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            font-size: 13px;
        }
        /* ─── ПОЛЕ (движок хода) ─── */
        .board-wrap{position:relative; width:100%; max-width:640px; margin:0 auto; aspect-ratio:1.46;
            border-radius:16px; overflow:hidden; border:1px solid rgba(217,184,119,.28);
            background:linear-gradient(180deg,#121620,#0d1016);
            box-shadow:0 16px 46px rgba(0,0,0,.6), inset 0 0 60px rgba(0,0,0,.4);}
        /* ── ЦИФРОВОЕ ПОЛЕ: клетки собраны в коде ── */
        :root{ --c-salary:#d9b877; --c-career:#6f9ceb; --c-stock:#5ec6d0; --c-skill:#6bbf9f;
               --c-kids:#d99abf; --c-market:#e0a86a; --c-expense:#cf8a8a; --c-deal:#7fbf8f;
               --c-gov:#a68fd0; --c-jail:#8a9099; --c-work:#d4b06a; --c-tax:#cf7a7a;
               --c-black:#5b616b; --c-svyaz:#d99abf; --c-med:#6bbf9f; --c-ticket:#efd8a3; }
        .dcell{position:absolute; border:1px solid var(--lx-line); border-radius:7px; overflow:hidden;
            background:linear-gradient(180deg,var(--lx-panel2),var(--lx-panel));
            display:flex; flex-direction:column; align-items:center; padding:4px 2px 3px; text-align:center; transition:box-shadow .3s;}
        .dcell .dstrip{position:absolute; top:0; left:0; right:0; height:3px; background:var(--cc);}
        .dcell .dic{font-size:clamp(9px,1.7vw,17px); margin-top:3px; line-height:1; filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
        .dcell .dnm{font-size:clamp(5px,.92vw,9px); font-weight:700; margin-top:2px; line-height:1.02; text-transform:uppercase; color:var(--lx-text); letter-spacing:.01em;}
        .dcell.corner{background:linear-gradient(180deg,#1b1f28,#0e1218); border-color:var(--lx-gold-ln);}
        .dcell.corner .dic{font-size:clamp(12px,2.4vw,22px);}
        .dcell.corner .dnm{color:var(--lx-gold-br);}
        .dcell.dactive{box-shadow:0 0 0 2px var(--lx-gold-br), 0 0 18px 3px rgba(217,184,119,.45); z-index:6;}
        .dcenter{position:absolute; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:6px;}
        .dcenter .dring{width:min(24vw,210px); aspect-ratio:1; border-radius:50%; display:grid; place-items:center;
            background:radial-gradient(circle at 50% 42%, rgba(217,184,119,.10), transparent 62%);
            border:1px solid var(--lx-gold-ln); box-shadow:inset 0 0 34px rgba(0,0,0,.5);}
        .dcenter .dvia{font-family:Georgia,serif; font-size:clamp(15px,3.6vw,34px); color:var(--lx-gold-br); font-weight:600; letter-spacing:.05em; line-height:.95;}
        .dcenter .dcf{font-size:clamp(6px,1.1vw,11px); letter-spacing:.5em; text-transform:uppercase; color:var(--lx-muted); margin-top:3px;}
        .dcenter .dpath{margin-top:9px; font-size:clamp(6px,1.0vw,10px); color:#cdc8bd; line-height:1.6;}
        .dcenter .dpath b{color:var(--lx-gold-br);}
        .dcenter .dlbl{font-size:8px; letter-spacing:.26em; text-transform:uppercase; color:var(--lx-gold); font-weight:700; margin-bottom:4px;}
        .tok{position:absolute; width:3.4%; aspect-ratio:1; border-radius:50%; transform:translate(-50%,-50%);
            border:2px solid rgba(255,255,255,.85); box-shadow:0 2px 8px rgba(0,0,0,.55),0 0 12px currentColor; z-index:5;
            transition:left .55s cubic-bezier(.34,1.1,.64,1), top .55s cubic-bezier(.34,1.1,.64,1);}
        .tok.turn{z-index:6; box-shadow:0 2px 8px rgba(0,0,0,.55),0 0 18px 3px currentColor, 0 0 0 2px rgba(239,216,163,.9);}
        .tok.turn::after{content:""; position:absolute; inset:-40%; border-radius:50%; border:2px solid currentColor; opacity:.5; animation:tokping 1.5s ease-out infinite;}
        @keyframes tokping{0%{transform:scale(.6);opacity:.6}100%{transform:scale(1.5);opacity:0}}
        @keyframes tokbob{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-72%)}}
        .glow{position:absolute; width:8.5%; aspect-ratio:1; transform:translate(-50%,-50%); border-radius:16px;
            pointer-events:none; z-index:4; box-shadow:0 0 0 3px currentColor,0 0 28px 6px currentColor; animation:glowlp 1.1s ease-in-out infinite;}
        @keyframes glowlp{0%,100%{opacity:.55}50%{opacity:1}}
        .pchip{display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:20px;
            background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); font-size:12px; margin:3px;}
        .pchip.turn{border-color:#fff; box-shadow:0 0 14px rgba(255,255,255,.3); transform:scale(1.06);}
        .pchip .dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 8px currentColor;}
        /* ─── ЛЮКС-ПЕРЕОДЕВАНИЕ ПАНЕЛЕЙ ДЕЙСТВИЙ (Карьера/Навык/Государство/Рынок/Работа/Расходы/Налоги/Связи/Медицина): убираем кислотные цвета ─── */
        .card[style*="border-color:#"]{ border-color:var(--lx-line) !important; }
        .card > .block-title[style*="color:#"]{ color:var(--lx-muted) !important; border-bottom-color:var(--lx-gold-ln) !important; }
        .card .btn[style*="width:100%"]{ background:linear-gradient(180deg,var(--lx-gold-br),var(--lx-gold)) !important; color:#20180a !important; border:0 !important; box-shadow:0 8px 22px rgba(217,184,119,.18) !important; }
        .card .btn[style*="width:100%"]:hover{ filter:brightness(1.04); }
        /* ─── КАЗИНО: атмосфера (фетр, барабаны, свет) ─── */
        .casino-felt{position:relative; overflow:hidden;
            border:1px solid var(--lx-gold-ln) !important;
            background:
              radial-gradient(120% 80% at 50% 0%, rgba(217,184,119,.08), transparent 52%),
              radial-gradient(90% 130% at 50% 130%, rgba(38,102,66,.42), transparent 62%),
              repeating-linear-gradient(135deg, rgba(255,255,255,.012) 0 3px, transparent 3px 6px),
              linear-gradient(180deg,#123120,#0a1a12) !important;
            box-shadow:0 18px 46px rgba(0,0,0,.55), inset 0 0 46px rgba(0,0,0,.4), 0 0 32px -12px var(--lx-gold) !important;}
        .casino-lights{position:absolute; top:0; left:0; right:0; height:4px;
            background:repeating-linear-gradient(90deg, var(--lx-gold-br) 0 5px, rgba(217,184,119,.15) 5px 12px);
            animation:marquee 1.1s linear infinite;}
        @keyframes marquee{to{background-position:12px 0}}
        .reels{display:flex; gap:9px; justify-content:center; margin:12px 0; padding:12px 10px; border-radius:14px;
            background:#0a120d; border:1px solid var(--lx-gold-ln); box-shadow:inset 0 4px 18px rgba(0,0,0,.7), inset 0 0 0 1px rgba(0,0,0,.5);}
        .reel{width:clamp(44px,17%,64px); aspect-ratio:.82; border-radius:10px; display:grid; place-items:center;
            font-size:clamp(22px,6.5vw,32px); background:linear-gradient(180deg,#182219,#0b110d);
            border:1px solid rgba(217,184,119,.25); box-shadow:inset 0 3px 12px rgba(0,0,0,.7);
            animation:reelglow 1.8s ease-in-out infinite;}
        .reel:nth-child(2){animation-delay:.3s} .reel:nth-child(3){animation-delay:.6s}
        @keyframes reelglow{0%,100%{filter:brightness(.92)}50%{filter:brightness(1.28) drop-shadow(0 0 7px rgba(217,184,119,.55))}}
        .casino-spin{border:1px solid var(--lx-gold) !important; color:#f7e6c8 !important; font-weight:900 !important;
            background:linear-gradient(180deg,#b6433f,#8c2c2a) !important;
            box-shadow:0 8px 22px rgba(140,44,42,.45), inset 0 1px 0 rgba(255,255,255,.18), 0 0 16px -4px rgba(217,184,119,.5) !important;
            text-shadow:0 1px 2px rgba(0,0,0,.4); letter-spacing:.04em;}
        .casino-spin:hover{filter:brightness(1.08)}
        .suit-r{color:#d98a8a} .suit-b{color:#cdc8bd}
    </style>
</head>

        // ─── БИРЖА (торговля по живой цене сервера) ───
        function assetById(id){ const m=state.market; return (m&&m.assets)?m.assets.find(x=>String(x.id)===String(id)):null; }
        function curPrice(id){ const a=assetById(id); return a?a.price:null; }
        function portfolioValue(p){ let v=0; if(p&&p.holdings){for(const id in p.holdings){const pr=curPrice(id); if(pr) v+=pr*p.holdings[id].qty;}} return v; }
        // Окно покупки: открывается на 1 мин, когда кто-то встаёт на клетку «Акции/Крипта» (для ВСЕХ).
        function buyWindowOpen(){ const b=state.board; return !!(b && b.buyWindowEndsAt && b.buyWindowEndsAt*1000 > Date.now()); }
        // Разделение разрядов (1 000 000) — числа легче читать. Только для ПОКАЗА, не для арифметики.
        function fmtN(n){ return (Math.round(Number(n)||0)).toLocaleString('ru-RU'); }
        // Проценты: большие (мемы +240 000%) с разрядами, мелкие с десятой.
        function fmtPct(chg){ const s=chg>=0?'+':''; return Math.abs(chg)>=1000 ? s+fmtN(Math.round(chg))+'%' : s+chg.toFixed(1)+'%'; }
        // 🔒 АНТИ-ОБМАН: карта конкретного объекта (asset_/big_) закрепляется за купившим.
        // Владелец пишется в p.ownedCards (синхрится через broadcast игроков) → другой её отсканить не может.
        function cardOwner(token){ for(const pl of (state.players||[])){ if((pl.ownedCards||[]).includes(token)) return pl; } return null; }
        // ── КОМИССИЯ БИРЖИ: спред + надбавка за ЧАСТОТУ спекуляций (часто торгуешь → выше комиссия) ──
        // Часто спекулирует — биржа/брокер забирает больше. Комиссия = сток денег из экономики (анти-скальп).
        const FEE_BASE = 0.008;   // базовый спред 0.8% на каждую сделку
        const FEE_STEP = 0.002;   // +0.2% за каждую совершённую сделку в игре (растёт у скальперов)
        const FEE_CAP  = 0.06;    // потолок 6%
        function tradeFeePct(p){ const s=p.stats||{}; const n=(Number(s.buys)||0)+(Number(s.sells)||0); return Math.min(FEE_CAP, FEE_BASE + n*FEE_STEP); }
        function logTrade(p,side,name,qty,price,gross,fee){ p.trades=p.trades||[]; p.trades.push({t:Date.now(),side,name,qty,price:Math.round(price*100)/100,gross:Math.round(gross),fee:Math.round(fee)}); if(p.trades.length>120) p.trades=p.trades.slice(-120); }
        // Открыть красивое окно покупки (в стиле игры) для актива id.
        function openBuyModal(id){
            const a=assetById(id); if(!a) return;
            const p=state.players.find(x=>x.id==state.currentPlayerId);
            if(p && (Number(p.jail)||0)>0){ alert('🔒 Ты в тюрьме — покупка недоступна. Только казино.'); return; }
            state.buyModal={assetId:String(id), qty:0}; render();
        }
        function closeBuyModal(){ state.buyModal=null; render(); }
        function setBuyByFrac(frac){
            const bm=state.buyModal; if(!bm) return;
            const p=state.players.find(x=>x.id==state.currentPlayerId); const a=assetById(bm.assetId); if(!p||!a) return;
            const budget = (frac>=1 ? 0.98 : frac) * (Number(p.savings)||0);   // 100%/МАКС с запасом 2% под проскальзывание
            bm.qty = Math.max(0, Math.floor(budget/(a.price*(1+tradeFeePct(p)))));
            render();
        }
        function setBuyMin(){ const bm=state.buyModal; if(bm){ bm.qty=1; render(); } }
        function onBuyManual(v){   // ручной ввод: обновляем оценку и кнопку БЕЗ полного render (не терять фокус)
            const bm=state.buyModal; if(!bm) return;
            bm.qty=Math.max(0,Math.floor(Number(v)||0));
            const p=state.players.find(x=>x.id==state.currentPlayerId); const a=assetById(bm.assetId); if(!p||!a) return;
            const q=bm.qty, price=a.price, cost=q*price, fee=q*price*tradeFeePct(p), total=cost+fee, enough=total<=p.savings;
            const est=document.getElementById('buyEst'); if(est) est.innerHTML=buyEstHtml(q,price,cost,fee,total,p.savings);
            const btn=document.getElementById('buyConfirmBtn');
            if(btn){ btn.disabled=(q<1); btn.style.background=(enough&&q>0)?'linear-gradient(180deg,#efd8a3,#d9b877)':'#374151'; btn.style.color=(enough&&q>0)?'#20180a':'#9ca3af'; btn.textContent=q>0?(enough?`✅ Купить ${fmtN(q)} шт за ${fmtN(Math.round(total))}$`:`Не хватает — нужно ${fmtN(Math.round(total))}$`):'Выбери количество'; }
        }
        async function confirmBuy(){
            const bm=state.buyModal; if(!bm) return;
            const id=bm.assetId, q=Math.floor(Number(bm.qty)||0);
            if(!q||q<1){ alert('Выбери количество — кнопкой % / Мин / Макс или впиши вручную.'); return; }
            state.buyModal=null;
            await buyAssetQty(id, q);
        }
        function buyEstHtml(q,price,cost,fee,total,cash){

        }
        function renderBuyModal(){

            const base=a.price0||price, chg=base?((price/base-1)*100):0;
            const pctBtn=(lbl,frac,bg)=>`<button onclick="setBuyByFrac(${frac})" class="btn" style="flex:1;min-width:52px;padding:8px 4px;font-size:13px;background:${bg||'#241a0c'};color:#efd8a3;border:1px solid #b98a3e;font-weight:700;">${lbl}</button>`;
            return `<div style="position:fixed;inset:0;z-index:4200;background:rgba(6,8,12,.9);display:flex;align-items:center;justify-content:center;padding:14px;" onclick="if(event.target===this){closeBuyModal();}">
                <div style="width:400px;max-width:100%;background:linear-gradient(180deg,#141821,#0b0e14);border:1px solid var(--lx-gold-ln);border-radius:18px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.6),0 0 32px -8px #d9b877;">
                    <div style="height:4px;background:linear-gradient(90deg,transparent,#efd8a3,transparent);"></div>
                    <div style="padding:20px;">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                            <div><div style="font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--lx-gold);font-weight:800;">Покупка на бирже</div>
                            <div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#f3efe6;line-height:1.1;">${a.name}</div>
                            <div style="font-size:12px;color:${chg>=0?'#10b981':'#f43f5e'};font-weight:700;margin-top:2px;">${price.toFixed(price<1?4:2)}$ · ${chg>=0?'▲':'▼'} ${fmtPct(chg)}</div></div>
                            <button onclick="closeBuyModal()" class="btn btn-gray" style="flex:0 0 auto;">✕</button>
                        </div>
                        <div style="font-size:12px;color:#9c988e;margin:14px 0 8px;">💰 Касса: <b style="color:var(--lx-gold-br);">${fmtN(p.savings)} $</b> &nbsp;·&nbsp; комиссия брокера ${(tradeFeePct(p)*100).toFixed(1)}%</div>
                        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">
                            <button onclick="setBuyMin()" class="btn" style="flex:1;min-width:48px;padding:8px 4px;font-size:13px;background:#1f2937;color:#fff;font-weight:700;">Мин</button>
                            ${pctBtn('10%',0.10)}${pctBtn('25%',0.25)}${pctBtn('50%',0.50)}${pctBtn('100%',1)}
                            <button onclick="setBuyByFrac(1)" class="btn" style="flex:1;min-width:58px;padding:8px 4px;font-size:13px;background:#166534;color:#fff;font-weight:800;border:1px solid #22c55e;">МАКС 💰</button>
                        </div>
                        <input id="buyManualQty" type="number" min="1" value="${q||''}" placeholder="или впиши количество вручную" oninput="onBuyManual(this.value)" class="inp" style="width:100%;font-family:ui-monospace,monospace;font-weight:700;font-size:16px;background:#0a120d;margin-bottom:10px;">
                        <div id="buyEst" style="background:#0d1016;border:1px solid #242833;border-radius:10px;padding:12px 13px;font-size:13px;color:#cdc8bd;line-height:1.8;margin-bottom:12px;">${buyEstHtml(q,price,cost,fee,total,p.savings)}</div>
                        <button id="buyConfirmBtn" onclick="confirmBuy()" ${q<1?'disabled':''} class="btn" style="width:100%;background:${enough&&q>0?'linear-gradient(180deg,#efd8a3,#d9b877)':'#374151'};color:${enough&&q>0?'#20180a':'#9ca3af'};font-weight:800;font-size:15px;padding:13px;">${q>0?(enough?`✅ Купить ${fmtN(q)} шт за ${fmtN(Math.round(total))}$`:`Не хватает — нужно ${fmtN(Math.round(total))}$`):'Выбери количество'}</button>
                    </div>
                </div>
            </div>`;
        }
        // Ядро покупки: q штук актива id (вызывается из окна покупки).
        async function buyAssetQty(id, q){
            const p=state.players.find(x=>x.id==state.currentPlayerId); const a=assetById(id);
            if(!p||!a) return;
            if((Number(p.jail)||0)>0){ alert('🔒 Ты в тюрьме — покупка недоступна. Только казино.'); return; }
            q=Math.floor(Number(q)||0);
            if(!q||q<1) return;
            const p0=a.price;                       // витрина ДО сделки
            let fill=p0;                            // цена исполнения (со стаканом)
            // 🛡️ АНТИ-ТИПО: даже по текущей витрине столько не потянуть (напр. миллион битков) →
            // мгновенный отказ БЕЗ обращения к бирже. Рынок НЕ двигается от одного ввода суммы.
            if(q*p0 > p.savings){ alert('Не хватает кассы: '+fmtN(q)+' шт × '+p0+'$ = '+fmtN(Math.round(q*p0))+'$, а у тебя '+fmtN(p.savings)+'$. Рынок не тронут — уменьши количество.'); return; }
            lastSaveT=Date.now();                   // защита от гонки: пока идёт сделка, push не подменяет state.players
            const origQ=q;
            if(SERVER_MODE){
                // 1) КОТИРОВКА (dry-run): узнаём цену исполнения со стаканом, НЕ двигая рынок для всех
                try{
                    const rq=await fetch('/market/impact',{method:'POST',headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({assetId:id,side:'buy',qty:q,commit:false})});
                    const jq=await rq.json(); if(jq&&jq.avgFill) fill=jq.avgFill;
                }catch(e){ console.warn('quote:',e); }
                // 2) АВТО-ПОДГОН: если по котировке (стакан + комиссия) не влезает — уменьшаем кол-во до того,
                //    что реально по карману. У мемов тонкий стакан → МАКС «уезжает», это и чиним.
                const feePct0=tradeFeePct(p);
                const maxAff=Math.floor((Number(p.savings)||0)/(fill*(1+feePct0)));
                if(maxAff<1){ alert('Не хватает даже на 1 шт «'+a.name+'» — при этом объёме стакан поднимает цену до ~'+fill+'$. Касса '+fmtN(p.savings)+'$.'); return; }
                if(q>maxAff){ q=maxAff; }   // подогнали под кассу (рынок ещё не тронут — котировка)
                // 3) КОММИТ: теперь реально двигаем цену для всех и берём по факту (объём меньше → слиппедж меньше)
                try{
                    const rc=await fetch('/market/impact',{method:'POST',headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({assetId:id,side:'buy',qty:q,commit:true})});
                    const jc=await rc.json(); if(jc&&jc.avgFill) fill=jc.avgFill;   // сервер двинул цену для всех
                }catch(e){ console.warn('impact:',e); }
            }
            const cost=Math.round(q*fill*100)/100;
            const feePct=tradeFeePct(p);
            const fee=Math.round(cost*feePct*100)/100;
            const totalCost=Math.round((cost+fee)*100)/100;
            if(p.savings<totalCost){ alert('Не хватает кассы (цена + комиссия). Нужно '+fmtN(Math.round(totalCost))+'$ (в т.ч. комиссия биржи '+fmtN(fee)+'$), есть '+fmtN(p.savings)+'$.'); return; }
            p.savings=Math.round((p.savings-totalCost)*100)/100;
            const bst=pstat(p); bst.buys++; bst.buyAmt=Math.round((bst.buyAmt+cost)*100)/100; bst.feePaid=Math.round(((bst.feePaid||0)+fee)*100)/100;
            p.holdings=p.holdings||{};
            const h=p.holdings[id]||{qty:0,avg:0,name:a.name};
            h.avg=(h.avg*h.qty + fill*q)/(h.qty+q); h.qty+=q; h.name=a.name;
            p.holdings[id]=h; logTrade(p,'BUY',a.name,q,fill,cost,fee); save(); render();
            const moved = Math.abs(fill-p0)>0.0001 ? ('\n📈 Твой объём двинул рынок: витрина была '+p0+'$, ты взял по ~'+fill+'$/шт.') : '';
            const trimmed = q<origQ ? ('\n✂️ Подогнал под кассу: взял '+fmtN(q)+' вместо '+fmtN(origQ)+' шт (у мемов стакан дорогой).') : '';
            alert('✅ Куплено '+fmtN(q)+' «'+a.name+'» по ~'+fill+'$ · комиссия биржи '+fmtN(fee)+'$ ('+(feePct*100).toFixed(1)+'%) · всего −'+fmtN(totalCost)+'$'+trimmed+moved);
        }

        const TOK_COLORS=['#ef4444','#3b82f6','#22c55e','#111827','#f97316','#eab308','#a855f7','#ec4899','#f8fafc','#9ca3af','#06b6d4','#92400e'];

                <div style="display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:6px;">
                    <select id="boardPid" class="inp" style="width:auto;padding:9px;">${opts}</select>
                    <input id="dieVal" type="number" min="1" max="6" placeholder="1–6" style="width:70px;padding:9px;border-radius:8px;border:1px solid #374151;background:#0b1020;color:#fff;text-align:center;font-weight:700;">
                    <button onclick="boardRoll(true)" class="btn btn-blue" style="font-weight:800;">▶ Пойти</button>

        function boardRoll(usePhysical){

            if(usePhysical){
                const el=document.getElementById('dieVal'); value=Math.max(1,Math.min(6,parseInt(el&&el.value,10)||0));

            }
            fetch('/turn/roll',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify(value?{pid,value}:{pid})})
                .catch(e=>console.warn('roll:',e));

        // ─── ТАЙМЕРЫ (Ф3): ход 2 мин мягкий, окно покупки 1 мин жёсткое ───
        function fmtLeft(endsAtSec){ const s=Math.max(0,Math.round(endsAtSec - Date.now()/1000)); const m=Math.floor(s/60); return m>0 ? (m+':'+String(s%60).padStart(2,'0')) : (s+'с'); }

        // ─── 🤖 АВТОПРОГОН БОТОВ (видимая имитация игры для проверки; ускоренная скорость) ───
        function autoToast(msg, color){

        function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
        async function autoBuyStock(p){
            const m=state.market; if(!m||!m.assets) return;
            const affordable=m.assets.filter(a=>a.price<=p.savings);
            if(!affordable.length) return;
            const a=affordable[Math.floor(Math.random()*affordable.length)];
            const q=Math.max(1, Math.floor((p.savings*0.3)/a.price));
            let fill=a.price;
            try{ const r=await fetch('/market/impact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({assetId:a.id,side:'buy',qty:q})}); const j=await r.json(); if(j&&j.avgFill) fill=j.avgFill; }catch(e){}
            const cost=Math.round(q*fill*100)/100; if(cost>p.savings) return;
            p.savings=Math.round((p.savings-cost)*100)/100;
            const st=pstat(p); st.buys++; st.buyAmt=Math.round((st.buyAmt+cost)*100)/100;
            p.holdings=p.holdings||{}; const h=p.holdings[a.id]||{qty:0,avg:0,name:a.name};

                                        <summary style="cursor:pointer; font-size:12px; color:#a78bfa; font-weight:bold; padding:4px 0;">🧠 Аналитика игрока (копится)</summary>
                                        <div style="padding:6px 8px; font-size:11px; color:#cbd5e1; line-height:1.8; background:#0c1424; border-radius:6px;">
                                            🎰 Казино: сыграл <b>${s.casinoPlays}</b> · выиграл <b style="color:#34d399;">${s.casinoWins}</b> (+${s.casinoWon}$) · проиграл <b style="color:#f87171;">${s.casinoLosses}</b> (−${s.casinoLost}$) · итог <b style="color:${net>=0?'#34d399':'#f87171'};">${net>=0?'+':''}${net}$</b><br>
                                            🛒 Покупок акций: <b>${s.buys}</b> на <b>${s.buyAmt}$</b> &nbsp;·&nbsp; 📈 Продаж: <b>${s.sells}</b> на <b>${s.sellAmt}$</b><br>
                                            💵 Зарплату получал <b>${s.salaryCount}</b> раз, всего <b>${s.salaryTotal}$</b>
                                        </div>
                                    </details>`; })()}

                                    <!-- ПОРТФЕЛЬ АКТИВОВ -->
                                    <details style="margin-bottom:6px;">
                                        <summary style="cursor:pointer; font-size:12px; color:#10b981; font-weight:bold; padding:4px 0;">📊 Портфель активов (${p.assets.length})</summary>
                                        <div style="padding:6px 0 0 0;">
                                        ${p.assets.length === 0
                                            ? '<div style="color:#4b5563; font-size:11px; padding:4px;">Активов нет</div>'
                                            : p.assets.map(a => {
                                                let info = '';
                                                if (a.type === 'STOCK') {
                                                    const val = (a.qty || 0) * (a.now || a.price || 0);
                                                    info = `${a.qty}×${a.price}$ → сейчас ${a.now}$/шт = ${val}$${a.div?` · ${a.div}%div`:''}`;
                                                } else if (a.type === 'ESTATE' || a.type === 'BUSINESS') {
                                                    info = `взнос ${a.down}$, цена ${a.price}$`;
                                                } else if (a.type === 'OTHER') {
                                                    info = `куплено ${a.price}$ → сейчас ${a.now}$`;
                                                }
                                                return `
                                                    <div style="padding:5px 8px; background:#0b0f19; border-radius:4px; margin-bottom:3px; font-size:11px;">
                                                        <div class="flex-between">
                                                            <span><b>${a.title}</b> <span style="color:#6b7280;">[${a.type}]</span></span>
                                                            <span style="display:flex;align-items:center;gap:6px;"><b style="color:${a.cf>0?'#10b981':'#6b7280'};">${a.cf>0?'+':''}${a.cf}$/мес</b><button onclick="admSellAsset(${p.id},'${a.id}')" class="btn" style="background:#065f46;color:#a7f3d0;padding:2px 7px;font-size:10px;" title="Продать в кассу игрока">💵</button><button onclick="admRemoveAsset(${p.id},'${a.id}')" class="btn" style="background:#7f1d1d;color:#fca5a5;padding:2px 7px;font-size:10px;" title="Убрать без денег">✖</button></span>
                                                        </div>
                                                        <div style="color:#6b7280; margin-top:2px;">${info}</div>
                                                    </div>`;
                                            }).join('')}
                                        </div>
                                    </details>

                                    <!-- 💼 АКЦИИ (биржа) — ведущий видит портфель игрока -->
                                    ${(() => {
                                        const hids = Object.keys(p.holdings || {});
                                        const pv = Math.round(portfolioValue(p));
                                        return `
                                    <details style="margin-bottom:6px;">
                                        <summary style="cursor:pointer; font-size:12px; color:#38bdf8; font-weight:bold; padding:4px 0;">💼 Акции на бирже (${hids.length}) · ${pv}$</summary>
                                        <div style="padding:6px 0 0 0;">
                                        ${hids.length === 0
                                            ? '<div style="color:#4b5563; font-size:11px; padding:4px;">Акций нет</div>'
                                            : hids.map(id => {
                                                const h = p.holdings[id]; const pr = curPrice(id) || 0;
                                                const val = Math.round(pr * (h.qty||0));
                                                const pl = h.avg ? ((pr/h.avg - 1)*100) : 0;
                                                const c = pl>=0 ? '#10b981' : '#f43f5e';
                                                return `<div style="padding:5px 8px; background:#0b0f19; border-radius:4px; margin-bottom:3px; font-size:11px;">
                                                    <div class="flex-between"><span><b>${h.name||id}</b> · ${h.qty} шт</span><span style="display:flex;align-items:center;gap:6px;"><b style="color:${c};">${val}$ (${pl>=0?'+':''}${pl.toFixed(0)}%)</b><button onclick="admSellHolding(${p.id},'${id}')" class="btn" style="background:#065f46;color:#a7f3d0;padding:2px 7px;font-size:10px;" title="Продать в кассу игрока">💵</button><button onclick="admRemoveHolding(${p.id},'${id}')" class="btn" style="background:#7f1d1d;color:#fca5a5;padding:2px 7px;font-size:10px;" title="Убрать без денег">✖</button></span></div>
                                                    <div style="color:#6b7280; margin-top:2px;">средняя ${Math.round(h.avg||0)}$ · сейчас ${pr}$/шт</div>
                                                </div>`;
                                            }).join('')}
                                        </div>
                                    </details>`;
                                    })()}

                                    <!-- ДОЛГИ -->
                                    <details>
                                        <summary style="cursor:pointer; font-size:12px; color:#ef4444; font-weight:bold; padding:4px 0;">💳 Непогашенные долги (${debts.length}) · Всего ${debtTotal}$</summary>
                                        <div style="padding:6px 0 0 0;">
                                            ${debts.length === 0
                                                ? '<div style="color:#10b981; font-size:11px; padding:4px;">✓ Все долги закрыты!</div>'
                                                : debts.map(d => `<div style="padding:4px 8px; background:#0b0f19; border-radius:4px; margin-bottom:3px; font-size:11px;">${d}</div>`).join('')}
                                        </div>
                                    </details>
                                </div>
                            `;
                            }).join('')}
                    </div>
                </div>
            `;
        }

        // ─── Действия ───
        function roll() { state.chosenProf = professionsDB[Math.floor(Math.random()*professionsDB.length)]; render(); }

        // ─── КАРЬЕРА (player-side): кубик → 97% навык (+1-2%, кап +20%), 3% (6% c Лидерством)
        // — ШАНС сменить профессию (по выбору игрока). ───
        function careerRoll(id) {
            if (!gate(id,'career')) return;
            const p = state.players.find(x => x.id === id);
            if (!p) return;
            if (!p.skills) p.skills = [];
            const hasLead = p.skills.some(s => s.key === 'lead');
            const changeChance = hasLead ? 6 : 3;
            const d100 = Math.floor(Math.random()*100) + 1;
            if (d100 <= changeChance) { offerProfessionChange(id); return; }
            const sk = CAREER_SKILLS[Math.floor(Math.random()*CAREER_SKILLS.length)];
            const curBonus = p.skills.reduce((s,x)=>s+(x.pct||0),0);
            if (curBonus >= 0.20) {
                p.notify = `🎓 Карьера (d100=${d100}): навык «${sk.name}», но бонус уже на капе +20% — прибавка не идёт, опыт записан.`;
            } else {
                p.skills.push({ key: sk.key, name: sk.name, pct: sk.pct });
                p.notify = `🎓 Карьера (d100=${d100}): навык «${sk.name}» (${sk.note}). Бонус навыков: +${Math.round(Math.min(0.20,curBonus+sk.pct)*100)}%.`;
            }
            if (sk.key === 'second') { save(); render(); offerProfessionChange(id); return; }
            save(); render();
        }

        function offerProfessionChange(id) {
            const p = state.players.find(x => x.id === id);
            if (!p) return;
            const opts = professionsDB.filter(pr => pr.name !== p.prof.name);
            const np = opts[Math.floor(Math.random()*opts.length)];
            const ok = confirm(`🔀 ШАНС СМЕНИТЬ ПРОФЕССИЮ!\n\nНовая: ${np.name} · з/п ${np.salary}$ (налог ${np.taxes}$)\nТекущая: ${p.prof.name} · з/п ${p.prof.salary}$\n\nПоменять? Касса, активы, долги и дети остаются — меняются зарплата и ставки расходов профессии.`);
            if (ok) {
                const old = p.prof.name; p.prof = np;
                p.notify = `🔀 Профессия изменена: ${old} → ${np.name}. Новая зарплата ${np.salary}$.`;
            } else {
                p.notify = `🔀 Шанс смены был — ты ОСТАЛСЯ: ${p.prof.name}.`;
            }
            save(); render();
        }

        function renderCareerPanel(p) {
            const f = calc(p);
            const bonusPct = Math.round((f.skillBonus||0)*100);
            const capped = (f.skillBonus||0) >= 0.20;
            const skillsHtml = (p.skills && p.skills.length)
                ? p.skills.map(s => `<span style="display:inline-block;background:#0b0f19;border:1px solid #334155;border-radius:6px;padding:2px 8px;margin:2px;font-size:11px;">${s.name} +${Math.round((s.pct||0)*100)}%</span>`).join('')
                : '<span style="color:#4b5563;font-size:12px;">Навыков пока нет</span>';
            return `
                <div class="card" style="border-color:#6366f1;">
                    <div class="block-title" style="color:#a5b4fc;">🎯 КАРЬЕРА (клетка после Зарплаты)</div>
                    <p style="font-size:12px;color:#9ca3af;margin-bottom:8px;">Попал на «Карьеру» → жми кубик. 97% — новый НАВЫК (+1-2% к зарплате, кап +20%); 3% (6% с Лидерством) — ШАНС сменить профессию (решаешь сам).</p>
                    <div style="margin-bottom:8px;">Бонус навыков: <b style="color:${capped?'#fbbf24':'#10b981'};">+${bonusPct}%${capped?' (кап)':''}</b> · база ${p.prof.salary}$ → <b style="color:#10b981;">${f.salary}$</b></div>
                    <div style="margin-bottom:10px;">${skillsHtml}</div>
                    <button onclick="careerRoll(${p.id})" class="btn" style="width:100%;background:#4f46e5;color:#fff;font-weight:800;font-size:14px;">🎲 КУБИК КАРЬЕРЫ</button>
                </div>
            `;
        }

        // ─── Клетка НАВЫК: окно с 5 картами (рубашкой вниз), выбираешь одну.
        // Шанс навыка = SKILL_CHANCE (10%), иначе пусто. «Вкладываешь в себя». ───
        const SKILL_CHANCE = 0.10;  // ← Rinat может менять процент здесь
        const SKILL_PITY = 6;       // ГАРАНТИЯ: каждое 6-е открытие даёт навык 100% (пити-счётчик p.skillTries)
        function openSkillModal(id) { if(!gate(id,'skill')) return; state.skillModal = { pId:id, revealed:null, gotKey:null }; render(); }
        function closeSkillModal() { state.skillModal = null; render(); }
        function pickSkillCard(idx) {
            const m = state.skillModal; if (!m || m.revealed !== null) return;
            const p = state.players.find(x => x.id === m.pId); if (!p) return;
            if (!p.lifeSkills) p.lifeSkills = {};
            const tries = (Number(p.skillTries)||0) + 1;   // это открытие
            const pity = tries >= SKILL_PITY;              // каждое 6-е — навык ГАРАНТИРОВАН
            if (pity || Math.random() < SKILL_CHANCE) {
                const sk = LIFE_SKILLS[Math.floor(Math.random()*LIFE_SKILLS.length)];
                p.lifeSkills[sk.key] = (p.lifeSkills[sk.key]||0) + 1;
                m.gotKey = sk.key;
                p.skillTries = 0;                          // сброс счётчика после навыка
                p.notify = `💡 НАВЫК! Выпал «${sk.name}» — уровень ${p.lifeSkills[sk.key]}.${pity?' 🎯 Гарантия за 6 открытий!':''} (${sk.draft})`;
            } else {
                m.gotKey = null;
                p.skillTries = tries;                      // копим до гарантии
                p.notify = `💡 Навык: пусто. До гарантированного навыка осталось ${SKILL_PITY - tries} открыт. (шанс ${Math.round(SKILL_CHANCE*100)}%)`;
            }
            m.revealed = idx;
            save(); render();
        }
        function renderSkillModal() {
            const m = state.skillModal; if (!m) return '';
            const mp = state.players.find(x=>x.id===m.pId);
            const left = mp ? (SKILL_PITY - (Number(mp.skillTries)||0)) : SKILL_PITY;
            const skName = m.gotKey ? ((LIFE_SKILLS.find(s=>s.key===m.gotKey)||{}).name || '') : '';
            const cards = [0,1,2,3,4].map(i => {
                let face='🂠', bg='#1e293b', label='';
                if (m.revealed !== null) {
                    if (i === m.revealed) {
                        if (m.gotKey) { face='💡'; bg='#065f46'; label=skName; }
                        else { face='✖'; bg='#374151'; label='Пусто'; }
                    } else { face='·'; bg='#0b0f19'; }
                }
                const click = m.revealed===null ? `onclick="pickSkillCard(${i})"` : '';
                const cur = m.revealed===null ? 'cursor:pointer;' : '';
                return `<div ${click} style="${cur}width:62px;height:90px;background:${bg};border:2px solid #475569;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;">${face}<div style="font-size:9px;color:#cbd5e1;margin-top:3px;text-align:center;line-height:1.1;">${label}</div></div>`;
            }).join('');
            const footer = m.revealed===null
                ? `<p style="color:#94a3b8;font-size:12px;margin-top:12px;">Выбери ОДНУ карту. Шанс навыка ${Math.round(SKILL_CHANCE*100)}% · <b style="color:#7dd3fc;">гарантия через ${left} открыт.</b></p>`
                : `<button onclick="closeSkillModal()" class="btn" style="margin-top:14px;background:#0284c7;color:#fff;font-weight:800;padding:8px 22px;">Закрыть</button>`;
            return `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:2000;display:flex;align-items:center;justify-content:center;">
                <div style="background:#0f172a;border:1px solid #334155;border-radius:14px;padding:22px;max-width:420px;text-align:center;">
                    <div style="font-size:16px;font-weight:800;color:#7dd3fc;margin-bottom:10px;">💡 НАВЫК — вытяни карту</div>
                    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">${cards}</div>
                    ${footer}
                </div>
            </div>`;
        }
        function renderSkillPanel(p) {
            const ls = p.lifeSkills || {};
            const owned = LIFE_SKILLS.filter(s => ls[s.key]);
            const chips = owned.length
                ? owned.map(s=>`<span style="display:inline-block;background:#0b0f19;border:1px solid #334155;border-radius:6px;padding:2px 8px;margin:2px;font-size:11px;">${s.name} ур.${ls[s.key]} <span style="color:#64748b;">— ${s.draft}</span></span>`).join('')
                : '<span style="color:#4b5563;font-size:12px;">Навыков пока нет</span>';
            return `
                <div class="card" style="border-color:#0ea5e9;">
                    <div class="block-title" style="color:#7dd3fc;">💡 НАВЫК (вкладываешь в себя — не всегда про работу)</div>
                    <p style="font-size:12px;color:#9ca3af;margin-bottom:8px;">Клетка «Навык» → окно с 5 картами, выбери одну. Шанс навыка ${Math.round(SKILL_CHANCE*100)}%, но <b style="color:#7dd3fc;">каждое ${SKILL_PITY}-е открытие — навык гарантированно</b>${(Number(p.skillTries)||0)>0?` (до гарантии ${SKILL_PITY-(Number(p.skillTries)||0)})`:''}.</p>
                    <div style="margin-bottom:10px;">${chips}</div>
                    <button onclick="openSkillModal(${p.id})" class="btn" style="width:100%;background:#0284c7;color:#fff;font-weight:800;font-size:14px;">🃏 КЛЕТКА «НАВЫК» (5 карт)</button>
                </div>
            `;
        }

        // ─── Клетка ГОСУДАРСТВО: налоги/сборы меняются со временем (1 год = 10 мин, как рынок).
        // ПРИНЦИП (Rinat): не крушить игру → капы + недостача кассы уходит в ДОЛГ банку (не в
        // минус-спираль). Обычно аккуратно; редко РЕЗКИЙ БУМ — больно, но выживаемо. ───
        let GAME_T0 = +(localStorage.getItem('via_t0') || 0);
        if (!GAME_T0) { GAME_T0 = Date.now(); try { localStorage.setItem('via_t0', GAME_T0); } catch(e){} }
        function govYears() { return Math.floor((Date.now() - GAME_T0) / (10*60*1000)); }
        function openGovModal(id) { if(!gate(id,'gov')) return; state.govModal = { pId:id, drawn:null }; render(); }
        function closeGovModal() { state.govModal = null; render(); }
        function drawGovCard() {
            const m = state.govModal; if (!m || m.drawn) return;
            const p = state.players.find(x => x.id === m.pId); if (!p) return;
            const yrReal = govYears();
            const yr = Math.min(yrReal, 15);
            const baseTax = p.prof.taxes;
            const TAXMOD_CAP = baseTax * 2;               // налоги не выше 3× базы (защита от краха)
            const pay = (amount) => {                     // касса не в минус: недостача → долг банку
                amount = Math.max(0, Math.round(amount));
                const fc = Math.min(amount, Math.max(0, Number(p.savings)||0));
                p.savings = (Number(p.savings)||0) - fc;
                const rest = amount - fc;
                if (rest > 0) p.bankLoan = (Number(p.bankLoan)||0) + rest;
                return rest;
            };
            const sal = p.prof.salary;
            const addTax = (delta) => { p.taxMod = Math.max(-baseTax, Math.min(TAXMOD_CAP, (Number(p.taxMod)||0) + Math.round(delta))); };
            const hasBiz = (p.assets||[]).some(a => a.type === 'BUSINESS');
            const note = (amt, rest) => `${amt}$${rest>0?` (кассы не хватило, ${rest}$ в долг банку)`:''}`;
            // КОЛОДА ГОСУДАРСТВА (14 событий). w = вес (частота). Все капы → игра не рушится.
            const E = [
                // 🟢 аккуратно (часто)
                { w:16, run:()=>{ const h=Math.max(10,Math.round(baseTax*(0.03+0.012*yr))); addTax(h); return {emoji:'🏛️',title:'Индексация налогов',text:`Инфляция: налоги +${h}$/мес (год ${yrReal}). Терпимо.`}; }},
                { w:15, run:()=>{ const fee=Math.max(30,Math.round(sal*0.04)); const r=pay(fee); return {emoji:'🧾',title:'Новый сбор',text:`Эко/утиль-сбор ${note(fee,r)} списан.`}; }},
                { w:14, run:()=>{ const up=Math.random()<0.5; const dlt=Math.max(10,Math.round(baseTax*0.04))*(up?1:-1); addTax(dlt); return {emoji:'⚖️',title:'Перерасчёт ставки',text:`Ставку ${up?'подняли':'снизили'}: налоги ${dlt>=0?'+':''}${dlt}$/мес.`}; }},
                // 🟡 заметно (разовое)
                { w:10, run:()=>{ const fee=Math.max(50,Math.round(sal*0.10)); const r=pay(fee); return {emoji:'📜',title:'Госпошлина/лицензия',text:`Оформление документов: ${note(fee,r)}.`}; }},
                { w:9,  run:()=>{ const fee=Math.max(40,Math.round(sal*(0.06+0.04*Math.random()))); const r=pay(fee); return {emoji:'🚓',title:'Штраф',text:`Админ-штраф ${note(fee,r)}.`}; }},
                { w:8,  run:()=>{ const fee=Math.max(60,Math.round(sal*(0.12+0.04*yr/15))); const r=pay(fee); return {emoji:'🔍',title:'Налоговая проверка',text:`Проверка по доходу: штраф ${note(fee,r)}.`}; }},
                { w:6,  run:()=>{ const fee=hasBiz?Math.max(150,Math.round(sal*0.25)):Math.max(40,Math.round(sal*0.05)); const r=pay(fee); return {emoji:'🏢',title:'Лицензия дороже',text:hasBiz?`Перелицензирование бизнеса: ${note(fee,r)}.`:`Сбор за разрешение ${note(fee,r)}.`}; }},
                // 🔴 резкий бум (редко, выживаемо)
                { w:5,  run:()=>{ const h=Math.max(50,Math.round(baseTax*(0.18+0.03*yr))); const before=Number(p.taxMod)||0; addTax(h); const got=(Number(p.taxMod)||0)-before; return {emoji:'💥',title:'Налоговая реформа',text:`Крупный рост: налоги +${got}$/мес. Держись.`}; }},
                { w:4,  run:()=>{ const h=Math.max(40,Math.round(baseTax*0.12)); addTax(h); const cap=Math.round(Math.max(0,Number(p.savings)||0)*0.5+sal*0.5); const f=Math.min(Math.round(sal*(0.25+0.05*yr)),Math.max(sal,cap)); const r=pay(f); return {emoji:'📉',title:'Кризис/девальвация',text:`Налоги +${h}$/мес и сбор ${note(f,r)}. Выкарабкивайся.`}; }},
                { w:3,  run:()=>{ const cap=Math.round(Math.max(0,Number(p.savings)||0)*0.5+sal*0.6); const f=Math.min(Math.round(sal*(0.30+0.05*yr)),Math.max(sal,cap)); const r=pay(f); return {emoji:'🧮',title:'Доначисление налоговой',text:`Доначислили ${note(f,r)}.`}; }},
                // ✨ повезло (редко)
                { w:3,  run:()=>{ const back=Math.max(15,Math.round(baseTax*0.18)); addTax(-back); return {emoji:'✨',title:'Налоговая льгота',text:`Вычет: налоги −${back}$/мес. Повезло!`}; }},

            const m = state.medModal; if (!m || m.drawn) return;
            const p = state.players.find(x => x.id === m.pId); if (!p) return;
            const sal = p.prof.salary;
            const c = MED_CARDS[Math.floor(Math.random()*MED_CARDS.length)];
            let text, color='#f87171';
            const pay = (amount) => { amount=Math.max(0,Math.round(amount)); const fc=Math.min(amount,Math.max(0,Number(p.savings)||0)); p.savings=(Number(p.savings)||0)-fc; const rest=amount-fc; if(rest>0)p.bankLoan=(Number(p.bankLoan)||0)+rest; return rest; };
            if (c.k === 'cost') {
                const cost=Math.max(20,Math.round(sal*c.m)); const rest=pay(cost);
                text=`Лечение: −${cost}$${rest>0?` (кассы не хватило, ${rest}$ в долг)`:''}.`;
            } else if (c.k === 'sick') {
                const loss=Math.max(30,Math.round(sal*c.m)); const rest=pay(loss);
                text=`Болел и не работал — потерял зарплату −${loss}$${rest>0?` (${rest}$ в долг)`:''}.`;
            } else if (c.k === 'chronic') {
                const cf=Math.max(15,Math.round(sal*c.m)); p.assets=p.assets||[];
                p.assets.push({ id:Date.now()+Math.floor(Math.random()*1000), type:'OTHER', title:'Здоровье: '+c.t, cf:-cf, now:0, price:0, health:true });
                text=`Хроническое: −${cf}$/мес из дохода (пока не вылечишь). Следи за здоровьем!`;
            } else if (c.k === 'tax') {
                const add=Math.max(10,Math.round(sal*0.02)); const cap=p.prof.taxes*2;
                p.taxMod=Math.min(cap,(Number(p.taxMod)||0)+add);
                text=`Медрасходы/страховка выросли: налоги-сборы +${add}$/мес.`;
            } else if (c.k === 'cash') {
                const b=Math.max(20,Math.round(sal*c.m)); p.savings=(Number(p.savings)||0)+b; color='#34d399';
                text=`Здоровье в плюс: +${b}$ в кассу.`;
            } else { // heal — снять одно хроническое
                p.assets=p.assets||[]; const idx=p.assets.findIndex(a=>a.health);
                if (idx>=0){ const rem=p.assets[idx]; p.assets.splice(idx,1); color='#34d399'; text=`Выздоровел! Убрал «${rem.title}» (вернул +${Math.abs(rem.cf)}$/мес дохода).`; }
                else { const b=Math.max(20,Math.round(sal*0.08)); p.savings=(Number(p.savings)||0)+b; color='#34d399'; text=`Здоров как бык — бонус +${b}$ в кассу.`; }
            }
            m.drawn = { emoji:c.e, title:c.t, text, color };
            p.notify = `⚕️ Медицина: ${c.t} — ${text}`;
            save(); render();
        }

        function resolveBlackCard(pid, card){
            const p = state.players.find(x=>x.id==pid); if(!p) return;
            let title, text, color;
            if(card.k==='crime'){
                p.savings = Math.round(((Number(p.savings)||0)+card.get)*100)/100;
                const roll=1+Math.floor(Math.random()*6);
                if(roll<=card.catch){ p.savings=Math.round(((Number(p.savings)||0)-card.penalty)*100)/100;
                    title='🚔 Поймали: '+card.t; text=`+${card.get}$, но выпало ${roll} → штраф −${card.penalty}$. Итог ${card.get-card.penalty}$.`; color='#f87171'; }
                else { title='😈 Пронесло: '+card.t; text=`+${card.get}$ и не поймали (выпало ${roll}).`; color='#34d399'; }
            } else if(card.k==='bet'){
                if((Number(p.savings)||0) < card.invest){ alert('🔒 Не хватает на вложение '+card.invest+'$.'); return; }
                p.savings=Math.round(((Number(p.savings)||0)-card.invest)*100)/100;
                const roll=1+Math.floor(Math.random()*6);
                if(roll>=card.win){ p.savings=Math.round(((Number(p.savings)||0)+card.payout)*100)/100;
                    title='🎲 Повезло: '+card.t; text=`Вложил ${card.invest}$, выпало ${roll} → вернулось ${card.payout}$ (${card.payout-card.invest>=0?'+':''}${card.payout-card.invest}$).`; color='#34d399'; }
                else { title='💀 Слив: '+card.t; text=`Вложил ${card.invest}$, выпало ${roll} → сгорело.`; color='#f87171'; }
            } else {
                if(card.get) p.savings=Math.round(((Number(p.savings)||0)+card.get)*100)/100;
                title='🖤 '+card.t; text=(card.get?`${card.get>=0?'+':''}${card.get}$. `:'')+(card.note||''); color= (card.get||0)>=0?'#a78bfa':'#f87171';
            }
            p.notify = `🖤 Чёрный рынок: ${card.t} — ${text}`;
            state.sdelkaModal = { pId:pid, drawn:{ emoji:'🖤', title, text, color } };
            save(); render();
        }

        function resolvePassiveCard(pid, card){
            const p = state.players.find(x=>x.id==pid); if(!p) return;
            const parts=[];
            if(card.pct){ const loss=Math.round((Number(p.savings)||0)*card.pct/100); p.savings=Math.round(((Number(p.savings)||0)-loss)*100)/100; parts.push(`−${loss}$ (${card.pct}% наличных)`); }
            if(card.cash){ p.savings=Math.round(((Number(p.savings)||0)-card.cash)*100)/100; parts.push(`−${card.cash}$ сразу`); }
            if(card.exp){ p.expMod=(Number(p.expMod)||0)+card.exp; parts.push(`+${card.exp}$/мес к расходам`); }
            if(card.tax){ p.taxMod=(Number(p.taxMod)||0)+card.tax; parts.push(`+${card.tax}$ к налогам`); }
            if(card.taxPct){ p.taxPct=(Number(p.taxPct)||0)+card.taxPct; parts.push(`+${card.taxPct}% к налогам`); }
            const text = (parts.join(', ')||'нет эффекта') + (card.note?`. ${card.note}`:'');
            p.notify = `📕 Пассив «${card.t}»: ${text}`;

            save(); render();

        function applyQRCard(type){
            const pid = state.currentPlayerId;
            if(!pid){ state.pendingQR = type; alert('📷 Карта отсканирована. Сначала войди под своим бланком — карта применится сама.'); render(); return; }
            if(type==='world' && !state.isAdmin){ alert('🌍 Мировое событие теперь открывает только ведущий — тебе тянуть не нужно. Ты увидишь результат, когда оно случится.'); return; }
            if(type==='ticket'){ showCardPreview(pid,type); return; }
            if(type==='child'){ showCardPreview(pid,type); return; }
            if(String(type).startsWith('invest_')){ showCardPreview(pid,type); return; }   // депозиты/облигации/рискованные (мелкие сделки)
            // РЕАЛЬНАЯ карта-актив (Малые активы): скан asset_<id> → офер покупки ИМЕННО этой карты
            if(String(type).startsWith('asset_')){
                const aid = parseInt(String(type).slice(6),10);
                const card = ASSET_CARDS.find(c=>c.id===aid);
                if(!card){ alert('Нет такой карты-актива: '+type); return; }
                const own=cardOwner(type);
                if(own && own.id!=pid){ alert('🔒 Эта карта уже куплена игроком «'+own.name+'» — закреплена за ним. Повторно взять нельзя.'); return; }
                if(own && own.id==pid){ alert('✅ Эта карта уже твоя — повторно её не берут.'); return; }
                state.players = state.players.map(x=>x.id==pid ? {...x, allow:'sdelka'} : x);
                save(pid);   // скан = разрешение; сохраняем на сервер, чтобы синхра не стёрла «allow» → не «жди ведущего»
                state.view='player';
                state.sdelkaModal = { pId:pid, deck:'big', token:type, drawn:{ kind:'business', card:{ e:'🏢', t:card.t, price:card.pay, val:card.val, cf:card.cf, liab:card.liab, k:card.k, income:card.income, thr:card.thr } } };
                render();
                return;
            }
            // КРУПНЫЕ СДЕЛКИ: скан big_<id> → офер покупки именно этой крупной сделки
            if(String(type).startsWith('big_')){
                const gid = parseInt(String(type).slice(4),10);
                const card = BIG_CARDS.find(c=>c.id===gid);
                if(!card){ alert('Нет такой крупной сделки: '+type); return; }
                const own=cardOwner(type);
                if(own && own.id!=pid){ alert('🔒 Эта сделка уже куплена игроком «'+own.name+'» — закреплена за ним. Повторно взять нельзя.'); return; }
                if(own && own.id==pid){ alert('✅ Эта сделка уже твоя — повторно её не берут.'); return; }
                state.players = state.players.map(x=>x.id==pid ? {...x, allow:'sdelka'} : x);
                save(pid);   // скан = разрешение; сохраняем на сервер, чтобы синхра не стёрла «allow»
                state.view='player';
                state.sdelkaModal = { pId:pid, deck:'big', token:type, drawn:{ kind:'business', card:{ e:'🏢', t:card.t, price:card.pay, val:card.val, cf:card.cf, liab:card.liab, note:card.note } } };
                render();
                return;
            }
            // ЧЁРНЫЙ РЫНОК: скан → предпросмотр карты → применить
            if(String(type).startsWith('black_')){ showCardPreview(pid,type); return; }
            // ПАССИВЫ: скан → предпросмотр карты → применить
            if(String(type).startsWith('passive_')){ showCardPreview(pid,type); return; }
            // РЫНОК: скан market_<id> → предложение продать объект по рыночной цене
            if(String(type).startsWith('market_')){
                const mid = parseInt(String(type).slice(7),10);
                const card = MARKET_CARDS.find(c=>c.id===mid);
                if(!card){ alert('Нет такой карты рынка: '+type); return; }
                state.view='player';
                resolveMarketCard(pid, card);
                return;
            }
            // СОБЫТИЯ: скан → предпросмотр карты → применить
            if(String(type).startsWith('event_')){ showCardPreview(pid,type); return; }
            const spec = QR_CARD[type];
            if(!spec){ alert('Неизвестная карта в QR: '+type); return; }
            const [key, openName, drawName] = spec;
            state.players = state.players.map(x=>x.id==pid ? {...x, allow:key} : x);  // скан карты = доверенно (как выдал ведущий)
            save(pid);   // сохраняем «allow» на сервер, чтобы синхра не стёрла его до открытия/покупки → не «жди ведущего»
            state.view='player'; render();
            window[openName](pid);   // пройдёт gate (allow=key), откроет модалку
            window[drawName]();      // авто-тянет и применяет эффект
        }
        // ─── 📷 ВСТРОЕННЫЙ СКАНЕР QR (камера прямо в игре, не выходя в отдельное приложение) ───
        let _scanStream=null, _scanRAF=null, _scanOverlay=null;
        async function startScan(){
            const hasBD = ('BarcodeDetector' in window);
            if(!hasBD && !window.jsQR){
                alert('Твой браузер не умеет сканировать. Наведи на QR обычной камерой телефона — карта тоже откроется.');
                return;
            }
            let stream;
            try{ stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}}); }
            catch(e){ alert('Камера недоступна: '+(e.message||e)); return; }
            _scanStream=stream;
            _scanOverlay=document.createElement('div');   // оверлей ВНЕ render — broadcast не снесёт видео
            _scanOverlay.style.cssText='position:fixed;inset:0;z-index:5000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;';
            const video=document.createElement('video'); video.setAttribute('playsinline',''); video.muted=true;
            video.style.cssText='width:100%;max-width:460px;border-radius:12px;border:2px solid #efd8a3;';
            const hint=document.createElement('div'); hint.textContent='📷 Наведи на QR-код карты'; hint.style.cssText='color:#fff;font-weight:800;margin-bottom:12px;font-size:16px;';
            const btn=document.createElement('button'); btn.textContent='✕ Закрыть'; btn.onclick=stopScan;
            btn.style.cssText='margin-top:16px;padding:12px 28px;border:none;border-radius:10px;background:#ef4444;color:#fff;font-weight:800;font-size:15px;';
            _scanOverlay.appendChild(hint); _scanOverlay.appendChild(video); _scanOverlay.appendChild(btn);
            document.body.appendChild(_scanOverlay);
            video.srcObject=stream; try{ await video.play(); }catch(e){}
            const det = hasBD ? new BarcodeDetector({formats:['qr_code']}) : null;
            const cnv = document.createElement('canvas'); const cctx = cnv.getContext('2d',{willReadFrequently:true});
            const tick=async()=>{
                if(!_scanStream) return;
                try{
                    if(det){ const codes=await det.detect(video); if(codes&&codes.length){ stopScan(); handleScannedQR(codes[0].rawValue||''); return; } }
                    else if(window.jsQR && video.videoWidth){   // fallback для iPhone/Safari и др. — чистый JS-декодер
                        cnv.width=video.videoWidth; cnv.height=video.videoHeight;
                        cctx.drawImage(video,0,0,cnv.width,cnv.height);
                        const im=cctx.getImageData(0,0,cnv.width,cnv.height);
                        const code=window.jsQR(im.data, im.width, im.height, {inversionAttempts:'dontInvert'});
                        if(code && code.data){ stopScan(); handleScannedQR(code.data); return; }
                    }
                }catch(e){}
                _scanRAF=requestAnimationFrame(tick);
            };
            _scanRAF=requestAnimationFrame(tick);
        }
        function stopScan(){
            if(_scanRAF){ cancelAnimationFrame(_scanRAF); _scanRAF=null; }
            if(_scanStream){ _scanStream.getTracks().forEach(t=>t.stop()); _scanStream=null; }
            if(_scanOverlay){ _scanOverlay.remove(); _scanOverlay=null; }
        }
        function handleScannedQR(raw){
            let card=null;
            try{ card=new URL(raw).searchParams.get('card'); }catch(e){}
            if(!card && /^[a-z_]+$/i.test((raw||'').trim())) card=(raw||'').trim();
            if(!card){ alert('Это не карта VIA: '+raw); return; }
            applyQRCard(card);
        }

        function sendAsset() {
            const type = document.getElementById('aType').value;
            const title = document.getElementById('aT').value.trim();
            if (!title) { alert('Введи название актива!'); return; }
            const details = { type, title };
            const p = state.players.find(pl => pl.id == state.currentPlayerId);

            if (type === 'STOCK') {
                const price = Number(document.getElementById('aPrice').value);
                const qty = Number(document.getElementById('aQty').value);
                const now = Number(document.getElementById('aNow').value);
                const div = Number(document.getElementById('aDiv').value) || 0;
                if (!price || !qty) { alert('Укажи цену покупки и количество!'); return; }
                if (div < 0 || div > 50) { alert('Дивиденды должны быть от 0 до 50%'); return; }
                details.price = price; details.qty = qty; details.now = now || price;
                details.div = div;
                details.cf = Math.round(price * qty * div / 100);  // месячный дивиденд от полной стоимости пакета
            } else if (type === 'ESTATE' || type === 'BUSINESS') {
                const down = Number(document.getElementById('aDown').value);
                const price = Number(document.getElementById('aPrice').value);
                const cf = Number(document.getElementById('aF').value);
                if (!down || !price) { alert('Укажи первый взнос и цену!'); return; }
                details.down = down; details.price = price; details.cf = cf || 0;
            } else {  // OTHER — монеты/золото/антиквариат, БЕЗ дохода (только цена)
                const price = Number(document.getElementById('aPrice').value);
                const now = Number(document.getElementById('aNow').value);
                if (!price) { alert('Укажи цену покупки!'); return; }
                details.price = price;
                details.now = now || price;
                details.cf = 0;  // дохода нет — только прибыль при продаже

        function send(type, details={}) {

            // Погашение долга стоит денег — сразу проверяем кассу, не гоняя заявку к ведущему впустую.

                if (owe > 0 && !confirm('Закрыть долг за '+fmtN(owe)+'$? Спишется с кассы (у тебя '+fmtN(cash)+'$). Ежемесячный платёж исчезнет.')) return;

        function sellStock(aId, title) {
            const p = state.players.find(pl => pl.id == state.currentPlayerId);
            const asset = p.assets.find(a => a.id == aId);
            if (!asset) return;

            state.deals.push({
                id: uid(), pId: p.id, pName: p.name,
                type: 'SELL_STOCK',

                status: 'PENDING'
            });
            save(); render();
        }

        // Какое поле долга закрывает заявка на погашение (для списания с кассы).
        const DEBT_FIELD = { PAY_MORTGAGE:'mLeft', PAY_EDU:'eLeft', PAY_AUTO:'aLeft', PAY_CC:'ccLeft', PAY_RETAIL:'rLeft', PAY_BANK:'bankLoan' };
        function appr(dId) {
            const d = state.deals.find(dl => dl.id == dId); if (!d) return;
            // ПОГАШЕНИЕ ДОЛГА СТОИТ ДЕНЕГ: проверяем кассу игрока ПЕРЕД одобрением. Не хватает — не одобряем.
            if (DEBT_FIELD[d.type]) {
                const pl = state.players.find(x => x.id == d.pId);
                const owe = pl ? (Number(pl[DEBT_FIELD[d.type]]) || 0) : 0;
                const cash = pl ? (Number(pl.savings) || 0) : 0;
                if (owe > 0 && cash < owe) {
                    alert('🚫 У «'+(pl?pl.name:'игрок')+'» не хватает кассы на погашение: нужно '+fmtN(owe)+'$, есть '+fmtN(cash)+'$. Заявка НЕ одобрена — пусть заработает и подаст снова.');
                    return;   // заявка остаётся в списке, долг не тронут
                }
            }
            state.players = state.players.map(p => {
                if (p.id != d.pId) return p;
                if (d.type === 'BUY_ASSET') p.assets.push({ ...d.details, id: Date.now() });
                else if (d.type === 'SELL_ASSET') p.assets = p.assets.filter(a => a.id != d.details.aId);
                else if (d.type === 'SELL_MARKET') {
                    const dd = d.details;
                    if (p.holdings && p.holdings[dd.assetId]) {
                        const sq = Math.min(dd.qty, p.holdings[dd.assetId].qty);
                        p.savings = Math.round(((p.savings || 0) + sq * dd.price) * 100) / 100;
                        p.holdings[dd.assetId].qty -= sq;
                        if (p.holdings[dd.assetId].qty <= 0) delete p.holdings[dd.assetId];
                    }
                }
                else if (d.type === 'SELL_STOCK') {
                    const dd = d.details;
                    const total = dd.sellQty * dd.price;
                    p.savings = (p.savings || 0) + total;
                    p.assets = p.assets.map(a => {
                        if (a.id != dd.aId) return a;
                        const newQty = a.qty - dd.sellQty;
                        if (newQty <= 0) return null;
                        return { ...a, qty: newQty, cf: Math.round(a.price * newQty * (a.div||0) / 100) };
                    }).filter(Boolean);
                }
                else if (d.type === 'PAY_MORTGAGE') { const owe=Number(p.mLeft)||0; p.savings=Math.round(((p.savings||0)-owe)*100)/100; p.isM = true; p.mLeft = 0; p.notify='🏠 Ипотека закрыта: −'+fmtN(owe)+'$ с кассы. Ежемесячный платёж снят.'; }
                else if (d.type === 'PAY_EDU') { const owe=Number(p.eLeft)||0; p.savings=Math.round(((p.savings||0)-owe)*100)/100; p.isE = true; p.eLeft = 0; p.notify='🎓 Кредит на образование закрыт: −'+fmtN(owe)+'$ с кассы.'; }
                else if (d.type === 'PAY_AUTO') { const owe=Number(p.aLeft)||0; p.savings=Math.round(((p.savings||0)-owe)*100)/100; p.isA = true; p.aLeft = 0; p.notify='🚗 Авто-кредит закрыт: −'+fmtN(owe)+'$ с кассы.'; }
                else if (d.type === 'PAY_CC') { const owe=Number(p.ccLeft)||0; p.savings=Math.round(((p.savings||0)-owe)*100)/100; p.isCC = true; p.ccLeft = 0; p.notify='💳 Долг по картам закрыт: −'+fmtN(owe)+'$ с кассы.'; }
                else if (d.type === 'PAY_RETAIL') { const owe=Number(p.rLeft)||0; p.savings=Math.round(((p.savings||0)-owe)*100)/100; p.isR = true; p.rLeft = 0; p.notify='🛍️ Розничный долг закрыт: −'+fmtN(owe)+'$ с кассы.'; }
                else if (d.type === 'CASINO_WIN') {
                    p.savings = Math.round(((p.savings||0) + d.details.payout) * 100) / 100;
                    p.notify = '🎉 ПОЗДРАВЛЯЕМ! Ведущий подтвердил твой выигрыш +' + d.details.payout + '$! 👑 Касса пополнена.';
                }
                else if (d.type === 'PAY_BANK') { const owe=Number(p.bankLoan)||0; p.savings=Math.round(((p.savings||0)-owe)*100)/100; p.bankLoan = 0; p.notify='🏦 Кредит банка закрыт: −'+fmtN(owe)+'$ с кассы.'; }
                else if (d.type === 'TAKE_LOAN') { p.bankLoan += d.details.amount; p.savings += d.details.amount; }
                return p;
            });
            state.deals = state.deals.filter(dl => dl.id != dId);
            save(); render();
        }

        function chChild(id, v) { state.players = state.players.map(p => p.id==id ? {...p, children: Math.max(0, p.children+v)} : p); save(); render(); }

        // Правка кассы ведущим: вбить сумму рядом и прибавить (+1) или отнять (−1). Всё авто-сохраняется.
        function bankAdjust(id, sign){
            const el=document.getElementById('bankAmt'+id);
            const amt=Math.round((Number(el&&el.value)||0)*100)/100;

        function minusEffect(c) {
            const a = [];
            if (c.hit) a.push('−' + c.hit + '$ сразу');
            if (c.hitPct) a.push('−' + c.hitPct + '% кассы сразу');
            if (c.monthly) a.push('+' + c.monthly + '$/мес расход');
            if (c.taxAdd) a.push('+' + c.taxAdd + '$ налог');
            if (c.taxPctAdd) a.push('+' + c.taxPctAdd + '% налог');
            return a.join(' · ');

                const np = { ...p };

                np.savings = Math.round((cash - (c.hit || 0) - (c.hitPct ? cash * c.hitPct / 100 : 0)) * 100) / 100;
                if (c.monthly) np.expMod = (Number(np.expMod) || 0) + c.monthly;

        function setJail(id, n) {

                if (p.id != id) return p;
                const wasFree = (Number(p.jail)||0) === 0;
                const nn = Math.max(0, Math.round(n));
                const jc = (wasFree && nn>0) ? (Number(p.jailCount)||0)+1 : (Number(p.jailCount)||0);
                // Новая посадка (был на свободе → сел) запускает выбор под давлением (2 окна).
                return {...p, jail: nn, jailCount: jc, jailPending: (wasFree && nn>0) ? true : (p.jailPending||null)};
            });
            save(); render();
        }

        function jailBuyoutPct(p){ const times = Math.max(1, Number(p.jailCount)||1); return Math.min(90, 30 + (times-1)*10); }
        function jailBuyout(id) {
            const p = state.players.find(x => x.id == id); if (!p) return;
            const times = Math.max(1, Number(p.jailCount)||1);
            const pct = jailBuyoutPct(p);
            const cost = Math.round((Number(p.savings)||0) * pct / 100);
            if (!confirm(`Откупиться из тюрьмы за ${pct}% кассы (−${cost}$)? Это ${times}-й раз в тюрьме — чем чаще сидишь, тем дороже. Выйдешь сразу.`)) return;
            state.players = state.players.map(x => x.id==id
