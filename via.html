                    <div style="font-family:Georgia,serif;font-size:26px;font-weight:800;color:#efd8a3;margin:6px 0 4px;">Тяни карту 🃏</div>
                    <p style="max-width:440px;color:#e7c9c9;font-size:14px;line-height:1.5;margin-bottom:22px;">Четыре карты. <b>Три</b> тебя ломают (+${JAIL_SUBMIT_PENALTY}% к расходам). <b>Одна</b> — ты продавил силой авторитета (−${JAIL_FIGHT_REWARD}% к налогам). Выбирай.</p>
                    <div style="display:flex;gap:12px;max-width:460px;width:100%;justify-content:center;">${cardBtns}</div>
                    <p style="color:#8a7f7f;font-size:12px;margin-top:20px;">Один шанс из четырёх. Рискни.</p>
                </div>`;
            }
            return `<div style="position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at 50% 25%,#2a0d0d,#08080c);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center;">
                <div style="font-size:52px;">🔒</div>
                <div style="font-family:Georgia,serif;font-size:28px;font-weight:800;color:#fff;margin:4px 0;">ТЫ ПОПАЛ В ТЮРЬМУ</div>
                <p style="max-width:460px;color:#e7c9c9;font-size:14px;line-height:1.5;margin-bottom:26px;">Тебя зажали. Путей два — и оба стоят дорого. Выбирай, пока решётка не захлопнулась.</p>
                <div style="display:flex;gap:14px;max-width:520px;width:100%;flex-wrap:wrap;">
                    <button onclick="jailSubmit(${p.id})" style="flex:1;min-width:180px;padding:20px 16px;border-radius:16px;border:2px solid #6b7280;background:linear-gradient(160deg,#1f2937,#111827);color:#e5e7eb;cursor:pointer;box-shadow:0 10px 26px rgba(0,0,0,.5);">
                        <div style="font-size:34px;">🙇</div>
                        <div style="font-size:17px;font-weight:800;margin:6px 0;">Послушаться тюремщиков</div>
                        <div style="font-size:12.5px;color:#9ca3af;line-height:1.4;">Смириться. Срок отсидишь спокойно, но <b style="color:#fca5a5;">+${JAIL_SUBMIT_PENALTY}% к прочим расходам НАВСЕГДА</b>. Точно.</div>
                    </button>
                    <button onclick="jailFight(${p.id})" style="flex:1;min-width:180px;padding:20px 16px;border-radius:16px;border:2px solid #b98a3e;background:linear-gradient(160deg,#3a2a12,#241a0c);color:#efd8a3;cursor:pointer;box-shadow:0 10px 26px rgba(0,0,0,.5);">
                        <div style="font-size:34px;">✊</div>
                        <div style="font-size:17px;font-weight:800;margin:6px 0;">Отмахнуться, стоять на своём</div>
                        <div style="font-size:12.5px;color:#d8c39a;line-height:1.4;">Тянешь карту. <b style="color:#6ee7b7;">1 из 4</b> — продавишь силой (−${JAIL_FIGHT_REWARD}% налоги). <b style="color:#fca5a5;">3 из 4</b> — сломают (+${JAIL_SUBMIT_PENALTY}% расходы).</div>
                    </button>
                </div>
                <p style="color:#8a7f7f;font-size:12px;margin-top:22px;">Других действий нет. Реши — и живи с этим.</p>
            </div>`;
        }
        // ─── РАЗРЕШЕНИЯ: кнопки клеток у игрока закрыты, пока ведущий не откроет КОНКРЕТНУЮ
        // клетку (p.allow = ключ). gate() проверяет+СЪЕДАЕТ разрешение (одноразовое). ───
        const ALLOW_LABEL = { career:'🎯 Карьера', skill:'💡 Навык', gov:'🏛️ Государство', world:'🌍 Мировое событие', work:'💼 Работа', expense:'💸 Расходы', tax:'🏦 Налоги', svyaz:'🌐 Связи', sdelka:'🤝 Сделки', med:'⚕️ Медицина' };
        function setAllow(id, key) { state.players = state.players.map(p => p.id==id ? {...p, allow:key} : p); save(); render(); }
        function gate(id, key) {
            const p = state.players.find(x => x.id === id);
            if (!p) return false;
            if ((Number(p.jail)||0) > 0) { alert('🔒 Ты в тюрьме — доступна только лудка (казино). Отбывай ходы или откупись.'); return false; }
            if (p.allow !== key) { alert('🔒 Жди — ведущий должен ОТКРЫТЬ тебе эту клетку.'); return false; }
            p.allow = null; save();   // одноразовое: разрешение потрачено
            return true;
        }

        function deletePlayer(id, name) {
            if (!confirm(`Удалить игрока "${name}" полностью?\n\nВсе его активы, долги и заявки также будут удалены. Это действие необратимо.`)) return;
            state.players = state.players.filter(p => p.id != id);
            state.deals = state.deals.filter(d => d.pId != id);  // clean up pending deals too
            save(); render();
        }

        // ═══════ 📊 АНАЛИТИКА ИГРОКОВ (таблица для разбора + копилка между играми) ═══════
        // Чистый капитал = касса + портфель (акции) + активы (бизнес/недвижка − обязательства) − кредит.
        function pnetWorth(p){
            let v = (Number(p.savings)||0) + portfolioValue(p);
            (p.assets||[]).forEach(a=>{ v += (Number(a.price)||0) - (Number(a.liab)||0); });
            v -= (Number(p.bankLoan)||0);
            return Math.round(v);
        }
        // История срезов копится в localStorage (на устройстве ведущего) — переживает очистку стола.
        function analyticsHistory(){ try{ return JSON.parse(localStorage.getItem('via_analytics_history')||'[]'); }catch(e){ return []; } }
        function prevSnapFor(name){ const h=analyticsHistory(); for(let i=h.length-1;i>=0;i--){ const pl=(h[i].players||[]).find(x=>x.name===name); if(pl) return {snap:h[i], pl}; } return null; }
        function saveSnapshot(auto){
            const players=(state.players||[]);
            if(!players.length){ if(!auto) alert('Нет игроков для среза.'); return; }
            const snap={ when:new Date().toLocaleString('ru-RU'), t:Date.now(), players: players.map(p=>{ const f=calc(p); const s=pstat(p); return {
                name:p.name, prof:(p.prof&&p.prof.name)||'', net:pnetWorth(p), savings:Math.round(Number(p.savings)||0),
                portfolio:Math.round(portfolioValue(p)), passive:f.passive, flow:f.flow,
                casinoNet:Math.round((s.casinoWon-s.casinoLost)), casinoPlays:s.casinoPlays,
                buyAmt:Math.round(s.buyAmt), sellAmt:Math.round(s.sellAmt),
                salaryTotal:Math.round(s.salaryTotal), children:Number(p.children)||0, jailCount:Number(p.jailCount)||0 }; }) };
            const h=analyticsHistory(); h.push(snap);
            try{ localStorage.setItem('via_analytics_history', JSON.stringify(h.slice(-200))); }catch(e){ console.warn('snap save',e); }
            if(!auto){ alert('📸 Срез сохранён ('+snap.when+'). Теперь таблица покажет рост/просадку к этой точке в следующих играх.'); render(); }
        }
        // Флажки «на что обратить внимание» — простые правила по данным игрока.
        function playerFlags(p,f,s){
            const flags=[]; const net=pnetWorth(p); const cn=s.casinoWon-s.casinoLost;
            if(cn < -0.15*Math.max(1,Math.abs(net)) && s.casinoLost>200) flags.push(['🎰 сливает в казино','#f87171']);
            if(f.flow<0) flags.push(['📉 расходы > доходов','#f87171']);
            if((Number(p.jailCount)||0)>=2) flags.push(['🔒 часто в тюрьме','#e0a3a3']);
            if((Number(p.bankLoan)||0) > f.income*3 && f.income>0) flags.push(['🏦 большой кредит','#fbbf24']);
            if(f.passive>=f.totalExp && f.totalExp>0) flags.push(['🏆 близко к свободе','#34d399']);
            return flags;
        }
        function renderAnalytics(app){
            const rowsData=[...(state.players||[])].map(p=>({p, f:calc(p), s:pstat(p), net:pnetWorth(p)})).sort((a,b)=>b.net-a.net);
            const back = state.isAdmin
                ? `<button onclick="state.view='admin';render();" class="btn btn-gray">← В пульт</button>`
                : `<button onclick="state.view='lobby';render();" class="btn btn-gray">← В лобби</button>`;
            const hist=analyticsHistory();
            if(!rowsData.length){ app.innerHTML=`<div class="card" style="max-width:700px;margin:24px auto;text-align:center;"><h2 style="font-weight:900;">📊 Аналитика</h2><p style="color:#9ca3af;margin:10px 0;">Пока нет игроков — начните партию, и здесь появится таблица.</p>${back}</div>`; return; }
            const rows=rowsData.map(({p,f,s,net},i)=>{
                const prev=prevSnapFor(p.name);
                let trend='<span style="color:#6b7280;">—</span>';
                if(prev){ const d=net-prev.pl.net; const up=d>=0; trend=`<span style="color:${up?'#34d399':'#f87171'};font-weight:700;">${up?'▲':'▼'} ${up?'+':''}${fmtN(d)}$</span><br><span style="font-size:9px;color:#6b7280;">было ${fmtN(prev.pl.net)}$</span>`; }
                const cn=Math.round(s.casinoWon-s.casinoLost);
                const flags=playerFlags(p,f,s);
                const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
                return `<tr style="border-top:1px solid #1f2430;">
                    <td style="padding:7px 8px;white-space:nowrap;"><b>${medal} ${p.name}</b><br><span style="font-size:10px;color:#9ca3af;">${(p.prof&&p.prof.name)||''}</span></td>
                    <td style="padding:7px 8px;text-align:right;font-family:ui-monospace,monospace;font-weight:800;color:#efd8a3;">${fmtN(net)}$</td>
                    <td style="padding:7px 8px;text-align:right;">${trend}</td>
                    <td style="padding:7px 8px;text-align:right;font-family:ui-monospace,monospace;">${fmtN(p.savings)}$</td>
                    <td style="padding:7px 8px;text-align:right;font-family:ui-monospace,monospace;">${fmtN(portfolioValue(p))}$</td>
                    <td style="padding:7px 8px;text-align:right;color:#5cb08b;">+${fmtN(f.passive)}</td>
                    <td style="padding:7px 8px;text-align:right;color:${f.flow>=0?'#5cb08b':'#f87171'};">${f.flow>=0?'+':''}${fmtN(f.flow)}</td>
                    <td style="padding:7px 8px;text-align:right;color:${cn>=0?'#5cb08b':'#f87171'};">${cn>=0?'+':''}${fmtN(cn)}$<br><span style="font-size:9px;color:#6b7280;">${s.casinoPlays} игр</span></td>
                    <td style="padding:7px 8px;text-align:right;font-size:11px;">🛒${fmtN(s.buyAmt)}<br>📤${fmtN(s.sellAmt)}</td>
                    <td style="padding:7px 8px;text-align:right;font-size:11px;">${fmtN(s.salaryTotal)}$<br><span style="font-size:9px;color:#6b7280;">${s.salaryCount}×</span></td>
                    <td style="padding:7px 8px;text-align:center;">${Number(p.jailCount)||0}</td>
                    <td style="padding:7px 8px;font-size:10px;line-height:1.6;">${flags.map(fl=>`<span style="color:${fl[1]};white-space:nowrap;">${fl[0]}</span>`).join('<br>')||'<span style="color:#4b5563;">—</span>'}</td>
                </tr>`;
            }).join('');
            app.innerHTML=`<div style="max-width:1120px;margin:16px auto;padding:0 8px;">
                <div class="card flex-between">
                    <div><h2 style="font-weight:900;">📊 Аналитика игроков</h2><p style="font-size:12px;color:#9ca3af;">Вся статистика копится в игре. Капитал = касса + портфель + активы − кредит. Стрелка — рост/просадка к прошлому срезу.</p></div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <button onclick="saveSnapshot(false)" class="btn" style="background:#4c1d95;color:#ddd6fe;" title="Зафиксировать текущие итоги — сравнивать игры между собой">📸 Снять срез</button>
                        ${back}
                    </div>
                </div>
                <div class="card" style="overflow-x:auto;">
                    <table style="width:100%;border-collapse:collapse;font-size:12.5px;min-width:920px;">
                        <thead><tr style="color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:.04em;text-align:right;">
                            <th style="padding:6px 8px;text-align:left;">Игрок</th><th style="padding:6px 8px;">Капитал</th><th style="padding:6px 8px;">Тренд</th><th style="padding:6px 8px;">Касса</th><th style="padding:6px 8px;">Портфель</th><th style="padding:6px 8px;">Пассив</th><th style="padding:6px 8px;">Поток</th><th style="padding:6px 8px;">Казино</th><th style="padding:6px 8px;">Сделки</th><th style="padding:6px 8px;">Зарплата</th><th style="padding:6px 8px;text-align:center;">Тюрьма</th><th style="padding:6px 8px;text-align:left;">На что смотреть</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
                <div class="card"><div style="font-size:12px;color:#9ca3af;">${hist.length?`📚 Сохранено срезов: <b>${hist.length}</b> · последний ${hist[hist.length-1].when}. Данные копятся между играми (на этом устройстве). При очистке стола срез снимается автоматически.`:`📚 Срезов пока нет. Нажми «📸 Снять срез» в конце партии — со следующей игры появится сравнение рост/просадка.`}</div></div>
            </div>`;
        }

        function clearAllPlayers() {
            if (!confirm(`ОЧИСТКА СТОЛА: удалить ВСЕХ ${state.players.length} игроков и все заявки?\n\nЭто действие необратимо.`)) return;
            if (!confirm('Точно? Это удалит ВСЁ.')) return;
            saveSnapshot(true);   // 📸 авто-срез итогов игры ПЕРЕД очисткой — данные копятся между играми
            state.players = [];
            state.deals = [];
            save(); render();
        }

        // ═══════ SYNC между вкладками — 4 канала надёжности ═══════
        // 1) BroadcastChannel — мгновенный, работает в file:// для same-origin
        if (bc) {
            bc.addEventListener('message', () => { reloadFromStorage(); safeRerender(); });
        }
        // 2) storage event (резерв)
        window.addEventListener('storage', (e) => {
            if (e.key === 'v0_players' || e.key === 'v0_deals') { reloadFromStorage(); safeRerender(); }
        });
        // 3) focus / visibilitychange — когда возвращаешься на вкладку
        window.addEventListener('focus', () => { reloadFromStorage(); safeRerender(); });
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) { reloadFromStorage(); safeRerender(); }
        });
        // 4) ГАРАНТИРОВАННЫЙ polling localStorage (только в file:// режиме)
        if (!SERVER_MODE) {
            lastDataHash = dataHash();
            setInterval(() => {
                const h = dataHash();
                if (h !== lastDataHash) {
                    lastDataHash = h;
                    reloadFromStorage();
                    safeRerender();
                }
            }, 1500);
        }

        // Запуск: сначала подтягиваем серверные данные (если SERVER_MODE), потом рендерим
        (async () => {
            if (SERVER_MODE) {
                await pollServer();
                startSSE();                      // мгновенный push — главный канал
                setInterval(pollServer, 3000);   // страховка на случай обрыва провода
            }
            const _qr = new URLSearchParams(location.search).get('card');
            if (_qr) { state.pendingQR = _qr; }   // пришли по QR-ссылке ?card=<тип>
            render();
            if (state.pendingQR && state.currentPlayerId) applyQRCard(state.pendingQR);
            if (document.getElementById('assetFields')) renderAssetForm();
        })();
    </script>
</body>
</html>
